name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # ground-station extra carries Pillow + luma, which the OLED/LCD/
          # widget UI test modules import at collection time. The vision extra
          # carries numpy, which the detection-decode test imports at collection
          # time (it is a pure numpy test; the sidecar's device runtime stays
          # lazy so no on-device inference package is needed here).
          pip install -e ".[dev,ground-station,vision]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Run tests
        run: pytest -v
