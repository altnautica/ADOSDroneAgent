# Prebuilt RTL8812EU kernel-module pipeline.
#
# Builds the vendored RTL8812EU driver (module name 8812eu) against the
# exact kernels the full agent runs on, so a fresh install can load a
# verified prebuilt .ko instead of compiling from scratch via DKMS. arm64
# only for v1; armhf targets keep falling back to DKMS at install time.
#
# Each matrix row declares a real kernel flavor: the apt repo that ships
# its headers, and the headers meta package to install. The build step
# installs that meta, DERIVES the exact kernelrelease from the installed
# /lib/modules/*/build tree (it does not guess the version), runs
# build-prebuilt-ko.sh against it, and names/sha256s/signs the artifact.
#
# Triggers:
#   - tag 'drivers-v*'  → permanent stable Release (signed, pinned URLs)
#   - workflow_dispatch → manual run
#   - schedule (daily)  → refresh the rolling 'prebuilt-drivers' prerelease
#                         as upstream distro kernels advance
#
# Artifacts are signed with Ed25519 via minisign, gated on the signing
# secret being present (forks skip signing cleanly). SHA256SUMS covers
# every artifact for fast integrity checks.

name: driver-build

on:
  push:
    tags:
      - "drivers-v*"
  workflow_dispatch: {}
  schedule:
    # Daily at 04:17 UTC. Catches distro kernel bumps that would otherwise
    # leave the rolling prerelease serving stale vermagic.
    - cron: "17 4 * * *"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.flavor }})
    runs-on: ubuntu-24.04-arm
    continue-on-error: ${{ matrix.experimental == true }}
    env:
      MINISIGN_KEY: ${{ secrets.LITE_AGENT_MINISIGN_KEY }}
      MINISIGN_PASSWORD: ${{ secrets.LITE_AGENT_MINISIGN_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Raspberry Pi OS arm64 default kernel (Pi 3 / 4 / 400 / Zero 2 W).
          - flavor: rpi-v8
            arch: arm64
            apt_repo: "deb http://archive.raspberrypi.org/debian bookworm main"
            apt_key_url: "https://archive.raspberrypi.org/debian/raspberrypi.gpg.key"
            headers_pkg: linux-headers-rpi-v8
          # Raspberry Pi 5 (BCM2712) kernel.
          - flavor: rpi-2712
            arch: arm64
            apt_repo: "deb http://archive.raspberrypi.org/debian bookworm main"
            apt_key_url: "https://archive.raspberrypi.org/debian/raspberrypi.gpg.key"
            headers_pkg: linux-headers-rpi-2712
          # Radxa RK35xx BSP kernel (Rock 5C / Rock 5 family).
          - flavor: radxa-rk35xx
            arch: arm64
            apt_repo: "deb https://radxa-repo.github.io/bookworm/ bookworm main"
            apt_key_url: "https://radxa-repo.github.io/bookworm/public.key"
            headers_pkg: linux-headers-5.10-rk35xx
          # Radxa A733 BSP kernel (Cubie A7Z). Experimental: the BSP repo
          # layout for this SoC is still moving, so a failure here must not
          # fail the whole build.
          - flavor: radxa-a733
            arch: arm64
            experimental: true
            apt_repo: "deb https://radxa-repo.github.io/bookworm/ bookworm main"
            apt_key_url: "https://radxa-repo.github.io/bookworm/public.key"
            headers_pkg: linux-headers-6.1-a733

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build toolchain + minisign
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential bc kmod patch minisign ca-certificates gnupg

      - name: Add vendor kernel apt repo
        run: |
          set -euo pipefail
          KEYRING="/usr/share/keyrings/${{ matrix.flavor }}-archive.gpg"
          curl -fsSL "${{ matrix.apt_key_url }}" | sudo gpg --dearmor -o "${KEYRING}"
          REPO='${{ matrix.apt_repo }}'
          # Re-stamp the repo line with the signed-by keyring path.
          REPO_SIGNED="${REPO/deb /deb [signed-by=${KEYRING}] }"
          echo "${REPO_SIGNED}" | sudo tee "/etc/apt/sources.list.d/${{ matrix.flavor }}.list"
          sudo apt-get update

      - name: Install kernel headers meta
        run: |
          set -euo pipefail
          sudo apt-get install -y --no-install-recommends "${{ matrix.headers_pkg }}"

      - name: Derive exact kernelrelease from installed headers
        id: kver
        run: |
          set -euo pipefail
          # Find the headers tree the meta package just installed. Take the
          # newest /lib/modules/*/build symlink/dir; its basename IS the
          # kernelrelease. Never guess it — read it from disk.
          KVER=""
          for d in /lib/modules/*/build; do
            [ -e "${d}" ] || continue
            cand="$(basename "$(dirname "${d}")")"
            # Prefer the most-recently-modified candidate.
            if [ -z "${KVER}" ] || [ "${d}" -nt "/lib/modules/${KVER}/build" ]; then
              KVER="${cand}"
            fi
          done
          if [ -z "${KVER}" ]; then
            echo "no /lib/modules/*/build tree found after installing ${{ matrix.headers_pkg }}" >&2
            exit 1
          fi
          echo "kver=${KVER}" >> "$GITHUB_OUTPUT"
          echo "Derived kernelrelease: ${KVER}"

      - name: Build prebuilt 8812eu.ko
        id: build
        run: |
          set -euo pipefail
          OUT="$(sudo bash scripts/drivers/build-prebuilt-ko.sh \
            "${{ steps.kver.outputs.kver }}" "${{ matrix.arch }}")"
          echo "${OUT}"
          KO_PATH="$(echo "${OUT}" | sed -n 's/^KO_PATH=//p')"
          if [ -z "${KO_PATH}" ] || [ ! -f "${KO_PATH}" ]; then
            echo "build-prebuilt-ko.sh did not emit a KO_PATH" >&2
            exit 1
          fi
          echo "ko_path=${KO_PATH}" >> "$GITHUB_OUTPUT"

      - name: Stage + name + sha256 artifact
        id: stage
        run: |
          set -euo pipefail
          KVER="${{ steps.kver.outputs.kver }}"
          ARCH="${{ matrix.arch }}"
          STAGING="$(mktemp -d)"
          ARTIFACT="8812eu-${KVER}-${ARCH}.ko"
          install -m 0644 "${{ steps.build.outputs.ko_path }}" "${STAGING}/${ARTIFACT}"
          ( cd "${STAGING}" && sha256sum "${ARTIFACT}" > "${ARTIFACT}.sha256" )
          echo "staging=${STAGING}" >> "$GITHUB_OUTPUT"
          echo "artifact=${ARTIFACT}" >> "$GITHUB_OUTPUT"

      - name: Sign artifact (minisign Ed25519)
        # Skipped cleanly when the signing secret is absent (forks, dry
        # runs). The upload tolerates a missing .minisig.
        if: ${{ env.MINISIGN_KEY != '' }}
        run: |
          set -euo pipefail
          STAGING="${{ steps.stage.outputs.staging }}"
          ARTIFACT="${{ steps.stage.outputs.artifact }}"
          KEY_FILE="$(mktemp)"
          printf '%s' "${MINISIGN_KEY}" > "${KEY_FILE}"
          echo "${MINISIGN_PASSWORD}" | minisign -S -s "${KEY_FILE}" -m "${STAGING}/${ARTIFACT}"
          shred -u "${KEY_FILE}"
          ls -l "${STAGING}/${ARTIFACT}.minisig"

      - uses: actions/upload-artifact@v4
        with:
          name: driver-${{ matrix.flavor }}
          path: |
            ${{ steps.stage.outputs.staging }}/${{ steps.stage.outputs.artifact }}
            ${{ steps.stage.outputs.staging }}/${{ steps.stage.outputs.artifact }}.sha256
            ${{ steps.stage.outputs.staging }}/${{ steps.stage.outputs.artifact }}.minisig
          if-no-files-found: warn
          retention-days: 14

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    env:
      MINISIGN_KEY: ${{ secrets.LITE_AGENT_MINISIGN_KEY }}
      MINISIGN_PASSWORD: ${{ secrets.LITE_AGENT_MINISIGN_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minisign + kmod
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends minisign kmod

      - name: Determine release metadata
        id: meta
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/drivers-v* ]]; then
            {
              echo "tag=${GITHUB_REF#refs/tags/}"
              echo "name=Prebuilt RTL8812EU modules ${GITHUB_REF#refs/tags/drivers-v}"
              echo "prerelease=false"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "tag=prebuilt-drivers"
              echo "name=Prebuilt RTL8812EU modules (rolling)"
              echo "prerelease=true"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Generate drivers-manifest.json
        # Pin every module URL to the resolved release tag so each install
        # downloads the exact .ko tested at build time, not whatever ends
        # up on a later release.
        run: |
          set -euo pipefail
          python scripts/emit_drivers_manifest.py \
            artifacts \
            artifacts/drivers-manifest.json \
            --release-tag "${{ steps.meta.outputs.tag }}"
          echo "Manifest contents:"
          cat artifacts/drivers-manifest.json

      - name: Sign the manifest (minisign Ed25519)
        if: ${{ env.MINISIGN_KEY != '' }}
        run: |
          set -euo pipefail
          KEY_FILE="$(mktemp)"
          printf '%s' "${MINISIGN_KEY}" > "${KEY_FILE}"
          echo "${MINISIGN_PASSWORD}" | minisign -S -s "${KEY_FILE}" -m artifacts/drivers-manifest.json
          shred -u "${KEY_FILE}"

      - name: Build per-file sha256 + SHA256SUMS
        working-directory: artifacts
        run: |
          set -euo pipefail
          # The manifest gets its own sha256 sidecar (the install path
          # verifies the manifest before trusting it).
          sha256sum drivers-manifest.json > drivers-manifest.json.sha256
          rm -f SHA256SUMS
          for f in 8812eu-*.ko drivers-manifest.json; do
            [ -e "$f" ] || continue
            sha256sum "$f" >> SHA256SUMS
          done
          cat SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          files: |
            artifacts/8812eu-*.ko
            artifacts/8812eu-*.ko.sha256
            artifacts/8812eu-*.ko.minisig
            artifacts/drivers-manifest.json
            artifacts/drivers-manifest.json.sha256
            artifacts/drivers-manifest.json.minisig
            artifacts/SHA256SUMS
          body: |
            Prebuilt RTL8812EU kernel modules (module name 8812eu) for arm64.

            GPL corresponding source: these modules are built from the
            vendored RTL8812EU source at vendor/rtl8812eu in this repository,
            with data/driver-patches/mesh-enable.patch applied, by
            scripts/drivers/build-prebuilt-ko.sh. The exact vendored commit
            and the mesh patch SHA256 are recorded in drivers-manifest.json.

            The full-agent install fetches drivers-manifest.json, looks up
            the running kernel's prebuilt module, verifies its SHA256 and
            signature, runs a vermagic safety check, and falls back to a
            DKMS build automatically when no verified prebuilt matches.

            Verify before installing:
              sha256sum -c SHA256SUMS
              minisign -V -p <vendored-public-key> -m 8812eu-<kernelrelease>-arm64.ko
