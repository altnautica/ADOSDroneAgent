# Prebuilt RTL8812EU kernel-module pipeline.
#
# Builds the patched 8812eu module against the EXACT kernels the supported
# boards run, so a fresh install can load a verified prebuilt module instead
# of compiling on the device (slow, and crash-prone on marginal hardware).
#
# Each matrix row is a real kernel flavor. The build runs INSIDE a distro
# container that matches the target's userspace (Raspberry Pi OS is Debian
# trixie + the raspberrypi.org apt repo), because the headers packages depend
# on that distro's 'linux-base' and will not resolve on a plain Ubuntu runner.
# The build installs the headers, derives the exact kernelrelease, runs
# build-prebuilt-ko.sh against it (same patches + relax-cflags as the on-device
# DKMS build), and emits the artifact + a manifest row. The publish job folds
# the rows into drivers-manifest.json and ships everything as Release assets.
#
# Coverage is the stock-kernel boards (Pi 3 / 4 / 5 / Zero 2 W) where the
# on-device compile is pure overhead. Vendor-BSP boards (e.g. RK3588 Radxa)
# keep the DKMS fallback: their headers packages age out of the public repo
# and are pinned to the flashed image, so a reproducible CI build is not
# durable. To add one later, pin its exact headers package + keyring from a
# live rig's apt cache and give it its own matrix row + container.
#
# Triggers:
#   - tag 'drivers-v*'   -> permanent stable Release (signed when the key
#                           secret is present; SHA256-only otherwise)
#   - workflow_dispatch  -> manual run for matrix iteration
#   - schedule (daily)   -> refresh the rolling 'prebuilt-drivers' prerelease
#                           as distro kernels advance
#
# Artifacts carry a SHA256 always; an Ed25519/minisign signature is added when
# ADOS_DRIVER_SIGNING_KEY is set (forks / unset key skip signing cleanly). The
# agent accepts SHA256-only in its dev posture and requires signatures only
# when a self-hoster provisions a key.
name: driver-build

on:
  push:
    tags:
      - "drivers-v*"
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.flavor }})
    runs-on: ubuntu-24.04-arm
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Raspberry Pi OS arm64 default kernel (Pi 3 / 4 / 400 / Zero 2 W).
          - flavor: rpi-v8
            container: debian:trixie
            apt_list: "deb [trusted=yes] http://archive.raspberrypi.org/debian trixie main"
            headers_pkg: linux-headers-rpi-v8
          # Raspberry Pi 5 (BCM2712) kernel.
          - flavor: rpi-2712
            container: debian:trixie
            apt_list: "deb [trusted=yes] http://archive.raspberrypi.org/debian trixie main"
            headers_pkg: linux-headers-rpi-2712
    steps:
      # The container base is minimal; checkout needs git, and apt fetches need
      # TLS roots. Install both before actions/checkout can run.
      - name: Prepare container
        run: |
          set -eux
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y git ca-certificates

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build toolchain + minisign
        run: |
          set -eux
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential bc kmod patch minisign gnupg curl jq libelf-dev

      - name: Add vendor kernel apt repo
        run: |
          set -euxo pipefail
          # trusted=yes skips upstream repo-signature verification. trixie's apt
          # uses Sequoia (sqv), which rejects the raspberrypi.org archive key for
          # its legacy SHA1 binding signature. Repo-signature verification of the
          # public headers feed is not our trust boundary: the .ko we publish
          # carries its own SHA256 (and minisign signature when a key is set), so
          # the artifact's integrity does not depend on the upstream apt signature.
          echo "${{ matrix.apt_list }}" | tee /etc/apt/sources.list.d/vendor-kernel.list
          apt-get update

      - name: Install kernel headers + derive kernelrelease
        id: kver
        run: |
          set -euxo pipefail
          DEBIAN_FRONTEND=noninteractive apt-get install -y "${{ matrix.headers_pkg }}"
          # The headers install drops /lib/modules/<KVER>/build; that <KVER> is
          # the exact release the module must match. Pick the newest dir that
          # actually has a build/ tree (find avoids ls-parsing pitfalls).
          KVER="$(for d in /lib/modules/*/build; do [ -d "$d" ] && basename "$(dirname "$d")"; done | sort -V | tail -n1)"
          test -n "${KVER}" && test -d "/lib/modules/${KVER}/build"
          echo "kver=${KVER}" >> "$GITHUB_OUTPUT"

      - name: Build the module
        run: |
          set -euo pipefail
          mkdir -p out
          # The build script prints the manifest row (one JSON object) on stdout
          # and everything else on stderr. Keep only the JSON line so a stray
          # stdout write can never corrupt the row the publish job slurps.
          bash scripts/drivers/build-prebuilt-ko.sh "${{ steps.kver.outputs.kver }}" out \
            | grep '^{' > "out/row-${{ matrix.flavor }}.json"
          cat "out/row-${{ matrix.flavor }}.json"

      - uses: actions/upload-artifact@v4
        with:
          name: ko-${{ matrix.flavor }}
          path: out/*
          if-no-files-found: error

  publish:
    name: publish manifest + modules
    needs: build
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dl

      - name: Install jq + minisign
        run: sudo apt-get update && sudo DEBIAN_FRONTEND=noninteractive apt-get install -y jq minisign

      - name: Assemble manifest + collect artifacts
        run: |
          set -euo pipefail
          mkdir -p rel
          find dl -name '8812eu-*.ko' -exec cp {} rel/ \;
          find dl -name '8812eu-*.ko.sha256' -exec cp {} rel/ \;
          # Fold every per-row JSON into drivers-manifest.json.
          jq -s '{generated: now | todate, drivers: .}' dl/*/row-*.json > rel/drivers-manifest.json
          ( cd rel && sha256sum drivers-manifest.json > drivers-manifest.json.sha256 )
          cat rel/drivers-manifest.json

      - name: Sign artifacts (only when the signing key is present)
        env:
          SIGNING_KEY: ${{ secrets.ADOS_DRIVER_SIGNING_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SIGNING_KEY}" ]; then
            echo "No ADOS_DRIVER_SIGNING_KEY set; publishing SHA256-only (dev posture)."
            exit 0
          fi
          printf '%s' "${SIGNING_KEY}" > /tmp/driver.key
          for f in rel/*.ko rel/drivers-manifest.json; do
            minisign -S -s /tmp/driver.key -m "${f}" -x "${f}.minisig"
          done
          rm -f /tmp/driver.key

      - name: Publish rolling prerelease (non-tag runs)
        if: ${{ github.ref_type != 'tag' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: prebuilt-drivers
          prerelease: true
          name: "Prebuilt RTL8812EU modules (rolling)"
          files: rel/*

      - name: Publish stable release (drivers-v* tags)
        if: ${{ github.ref_type == 'tag' }}
        uses: softprops/action-gh-release@v2
        with:
          files: rel/*
