# ADOS lite agent — universal SD-card image build pipeline.
#
# One workflow, N boards. Each board's recipe.sh under
# agents/lite-rs/imagebuilder/boards/<slug>/ defines how to drive the
# board's native build flow (Luckfox vendor SDK, pi-gen, Armbian, etc.).
# The orchestrator in agents/lite-rs/imagebuilder/lib/build-driver.sh
# runs the recipe and produces a signed flashable .img.gz.
#
# Triggers:
#   - Tag push `lite-image-v*` → builds every board in the matrix and
#     publishes a single GitHub Release containing every artifact.
#   - Manual workflow_dispatch → `boards` input narrows the matrix to a
#     comma-separated subset (default: luckfox-pico-zero,pi-zero-2w).

name: image-build

on:
  push:
    tags:
      - "lite-image-v*"
  workflow_dispatch:
    inputs:
      boards:
        description: "Comma-separated board slugs (or 'all')"
        required: false
        default: "all"
      version:
        description: "Image version tag (without lite-image-v prefix)"
        required: false
        default: "0.0.0-dev"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.board }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        board:
          - luckfox-pico-zero
          - pi-zero-2w

    env:
      IMGBUILD_OUTPUT: ${{ github.workspace }}/output
      LITE_AGENT_MINISIGN_KEY: ${{ secrets.LITE_AGENT_MINISIGN_KEY }}
      LITE_AGENT_MINISIGN_PASSWORD: ${{ secrets.LITE_AGENT_MINISIGN_PASSWORD }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Skip if narrowed matrix excludes this board
        id: gate
        run: |
          set -eu
          REQUESTED='${{ github.event.inputs.boards }}'
          if [ -z "${REQUESTED}" ] || [ "${REQUESTED}" = "all" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if echo ",${REQUESTED}," | grep -q ",${{ matrix.board }},"; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "Skipping ${{ matrix.board }} — not in dispatched list" >&2
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.build == 'true'
        with:
          submodules: recursive

      - name: Resolve version
        id: version
        if: steps.gate.outputs.build == 'true'
        run: |
          set -eu
          if [[ "${GITHUB_REF}" == refs/tags/lite-image-v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/lite-image-v}"
          else
            VERSION="${{ github.event.inputs.version || '0.0.0-dev' }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install host build dependencies
        if: steps.gate.outputs.build == 'true'
        run: |
          sudo apt-get update
          # Baseline: tools every recipe needs (clones, archives,
          # checksum + signing).
          sudo apt-get install -y --no-install-recommends \
            build-essential libncurses-dev rsync bc cpio file unzip \
            xz-utils python3 python3-yaml git bison flex wget \
            minisign
          # Luckfox vendor SDK + Buildroot 2023.02.6 host deps. Without
          # device-tree-compiler the post-kernel DTB assembly fails;
          # without u-boot-tools the boot.img mkimage step fails. The
          # rest cover rootfs assembly, post-image utilities, and
          # autotools-based Buildroot packages.
          sudo apt-get install -y --no-install-recommends \
            device-tree-compiler u-boot-tools \
            gcc-multilib g++-multilib module-assistant \
            gawk texinfo libssl-dev openssl cmake gperf \
            autoconf automake fakeroot \
            python-is-python3 \
            bsdmainutils lz4 \
            genext2fs mtd-utils \
            libncurses5-dev pkg-config
          # pi-gen path requires extra host tooling for chroot +
          # debootstrap + image manipulation. Cheap to install on a
          # fresh runner.
          if [ "${{ matrix.board }}" = "pi-zero-2w" ]; then
            sudo apt-get install -y --no-install-recommends \
              coreutils quilt parted qemu-user-static binfmt-support \
              debootstrap zerofree zip dosfstools e2fsprogs \
              libarchive-tools libcap2-bin grep rsync curl gpg pigz \
              xxd arch-test bmap-tools kmod
          fi

      - name: Run image build via universal orchestrator
        if: steps.gate.outputs.build == 'true'
        env:
          IMGBUILD_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -eux
          chmod +x agents/lite-rs/imagebuilder/lib/build-driver.sh
          agents/lite-rs/imagebuilder/lib/build-driver.sh ${{ matrix.board }}

      - name: Inspect artifacts
        if: steps.gate.outputs.build == 'true'
        run: ls -lah "${IMGBUILD_OUTPUT}/${{ matrix.board }}/"

      - name: Upload artifacts (workflow_dispatch fallback)
        if: ${{ github.event_name == 'workflow_dispatch' && steps.gate.outputs.build == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ados-${{ matrix.board }}-${{ steps.version.outputs.version }}
          path: ${{ env.IMGBUILD_OUTPUT }}/${{ matrix.board }}/*
          if-no-files-found: warn
          retention-days: 14

      - name: Publish to GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/lite-image-v') && steps.gate.outputs.build == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: lite-image-v${{ steps.version.outputs.version }}
          name: ADOS lite agent images ${{ steps.version.outputs.version }}
          fail_on_unmatched_files: false
          files: |
            ${{ env.IMGBUILD_OUTPUT }}/${{ matrix.board }}/ados-${{ matrix.board }}-*.img.gz
            ${{ env.IMGBUILD_OUTPUT }}/${{ matrix.board }}/ados-${{ matrix.board }}-*.img.gz.sha256
            ${{ env.IMGBUILD_OUTPUT }}/${{ matrix.board }}/ados-${{ matrix.board }}-*.img.gz.minisig
          body: |
            Flashable SD-card images for the ADOS lite Rust drone agent.

            Each `.img.gz` is signed with the ADOS lite-agent minisign
            keypair. Verify before flashing:

              minisign -V -P "$(grep -oE 'RW[A-Za-z0-9+/=]+' \
                  https://raw.githubusercontent.com/altnautica/ADOSDroneAgent/main/scripts/install-lite.sh \
                  | head -n1)" -m ados-<board>-${{ steps.version.outputs.version }}.img.gz

            Per-board flash + bring-up runbooks live at
            `agents/lite-rs/BENCH-BRINGUP-<BOARD>.md`.
