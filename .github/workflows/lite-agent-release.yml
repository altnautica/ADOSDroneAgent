# Lightweight Rust agent release pipeline.
#
# Triggers:
#   - push to main          → rolling 'lite-agent-main' GitHub Release (replaced each push)
#   - push of tag 'lite-v*' → permanent stable GitHub Release
#
# Build matrix:
#   armv7-unknown-linux-musleabihf  — primary low-RAM target (Luckfox class)
#   aarch64-unknown-linux-gnu       — Pi Zero 2 W, Pi 4B-class glibc
#   aarch64-unknown-linux-musl      — generic aarch64 musl
#   x86_64-unknown-linux-musl       — dev-container testing
#
# Each artifact is signed with Ed25519 via minisign. The public key is
# vendored in scripts/install-lite.sh so install paths verify before
# extracting. SHA256SUMS is generated for fast integrity checks.

name: lite-agent-release

on:
  push:
    branches:
      - main
    tags:
      - "lite-v*"
    paths:
      # Path filter applies to branch pushes only; tag pushes always
      # fire regardless of paths.
      - "agents/lite-rs/**"
      - ".github/workflows/lite-agent-release.yml"
      - "scripts/emit_lite_boards_manifest.py"
      - "src/ados/hal/boards/**"
      - "scripts/install.sh"
      - "scripts/install-lite.sh"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ubuntu-latest
    # Lift the signing secret into a job-level env so the step-level
    # `if:` condition can read it. The `secrets` context is not
    # available to step-level `if:` directly.
    env:
      MINISIGN_KEY: ${{ secrets.LITE_AGENT_MINISIGN_KEY }}
      MINISIGN_PASSWORD: ${{ secrets.LITE_AGENT_MINISIGN_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: armv7-unknown-linux-musleabihf
            short: armv7-musl
          - target: aarch64-unknown-linux-gnu
            short: aarch64-gnu
          - target: aarch64-unknown-linux-musl
            short: aarch64-musl
          - target: x86_64-unknown-linux-musl
            short: x86_64-musl

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        # cross runs the actual cross-compile inside its own Docker image
        # with the target std bundled. The host only needs cargo to invoke
        # cross; no rustup target add is required here.
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross@0.2.5

      - name: Install minisign
        run: |
          sudo apt-get update
          sudo apt-get install -y minisign

      - name: Resolve version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/lite-v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/lite-v}"
          else
            # Rolling main: read Cargo.toml workspace.package.version + short SHA
            CARGO_VERSION=$(grep -m1 '^version\s*=' agents/lite-rs/Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
            SHORT_SHA=$(git rev-parse --short HEAD)
            VERSION="${CARGO_VERSION}-main-${SHORT_SHA}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - name: Cross-compile release binary
        working-directory: agents/lite-rs
        run: cross build --release --target ${{ matrix.target }} -p ados-agent-lite

      - name: Stage artifact
        id: stage
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TARGET="${{ matrix.target }}"
          STAGING="$(mktemp -d)"
          BIN_NAME="ados-agent-lite"
          ARTIFACT="ados-agent-lite-${VERSION}-${TARGET}.tar.gz"

          install -m 0755 \
            "agents/lite-rs/target/${TARGET}/release/${BIN_NAME}" \
            "${STAGING}/${BIN_NAME}"
          install -m 0644 LICENSE "${STAGING}/LICENSE"
          install -m 0644 agents/lite-rs/README.md "${STAGING}/README.md"

          # Name files explicitly (no trailing ".") so the archive root
          # contains "ados-agent-lite" and not "./ados-agent-lite". The
          # install-lite.sh extractor expects the unprefixed form.
          tar -czf "${ARTIFACT}" -C "${STAGING}" ados-agent-lite LICENSE README.md
          sha256sum "${ARTIFACT}" > "${ARTIFACT}.sha256"
          echo "artifact=${ARTIFACT}" >> "$GITHUB_OUTPUT"

      - name: Sign artifact (minisign Ed25519)
        # The job-level env block above lifts the secret into env so
        # step-level `if:` can gate on it. When the secret is unset
        # (forks, dry-runs) the step is skipped cleanly and the upload
        # step uploads the unsigned artifact with `if-no-files-found:
        # warn`.
        if: ${{ env.MINISIGN_KEY != '' }}
        run: |
          ARTIFACT="${{ steps.stage.outputs.artifact }}"
          KEY_FILE="$(mktemp)"
          printf '%s' "${MINISIGN_KEY}" > "${KEY_FILE}"
          echo "${MINISIGN_PASSWORD}" | minisign -S -s "${KEY_FILE}" -m "${ARTIFACT}"
          shred -u "${KEY_FILE}"
          ls -l "${ARTIFACT}.minisig"

      - uses: actions/upload-artifact@v4
        with:
          name: lite-agent-${{ matrix.short }}
          path: |
            ${{ steps.stage.outputs.artifact }}
            ${{ steps.stage.outputs.artifact }}.sha256
            ${{ steps.stage.outputs.artifact }}.minisig
          # Don't fail the upload when the .minisig is absent (the
          # signing step may have been skipped in forks). The .tar.gz
          # and .sha256 are always present.
          if-no-files-found: warn
          retention-days: 14

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Determine release metadata
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/lite-v* ]]; then
            {
              echo "tag=${GITHUB_REF#refs/tags/}"
              echo "name=Lightweight agent ${GITHUB_REF#refs/tags/lite-v}"
              echo "prerelease=false"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "tag=lite-agent-main"
              echo "name=Lightweight agent (rolling main)"
              echo "prerelease=true"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Generate lite-boards.json manifest
        # Manifest enumerates lite-eligible boards from
        # src/ados/hal/boards/*.yaml. Published alongside the binaries so
        # install.sh can fingerprint the running SBC and dispatch to the
        # right install body.
        run: |
          python -m pip install --quiet pyyaml
          python scripts/emit_lite_boards_manifest.py artifacts/lite-boards.json
          echo "Manifest contents:"
          cat artifacts/lite-boards.json

      - name: Generate ados-agent-manifest.json
        # The Mission Control Flash Tool fetches this catalog. Pin install
        # URLs to the resolved release tag so each install body is the
        # exact one tested at release time, not whatever happens to be on
        # main when the operator runs it.
        run: |
          python scripts/emit_ados_agent_manifest.py \
            artifacts/ados-agent-manifest.json \
            --release-tag "${{ steps.meta.outputs.tag }}"
          echo "Manifest size: $(wc -c < artifacts/ados-agent-manifest.json) bytes"

      - name: Stage install scripts as release assets
        # Ship the install scripts alongside the binaries so the manifest
        # can pin per-tag URLs (releases/download/<tag>/install*.sh) and
        # the install body cannot drift between manifest fetches.
        run: |
          install -m 0755 scripts/install-lite.sh artifacts/install-lite.sh
          install -m 0755 scripts/install.sh      artifacts/install.sh

      - name: Build SHA256SUMS
        working-directory: artifacts
        run: |
          # Single SUMS file across all matrix targets + manifests + install scripts.
          rm -f SHA256SUMS
          for f in ados-agent-lite-*.tar.gz lite-boards.json ados-agent-manifest.json install-lite.sh install.sh; do
            [ -e "$f" ] || continue
            sha256sum "$f" >> SHA256SUMS
          done
          cat SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          files: |
            artifacts/ados-agent-lite-*.tar.gz
            artifacts/ados-agent-lite-*.sha256
            artifacts/ados-agent-lite-*.minisig
            artifacts/lite-boards.json
            artifacts/ados-agent-manifest.json
            artifacts/install-lite.sh
            artifacts/install.sh
            artifacts/SHA256SUMS
          body: |
            Prebuilt static binaries of the lightweight Rust agent.

            Verify before installing:
              minisign -V -p <vendored-public-key> -m <artifact.tar.gz>
              sha256sum -c SHA256SUMS

            Installation: see scripts/install-lite.sh in the repository.
