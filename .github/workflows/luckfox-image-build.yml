# Buildroot image-build pipeline for the Luckfox Pico Zero ADOS lite
# image. Triggers on tag push (`lite-image-v*`) for permanent releases
# plus manual dispatch for one-off rebuilds.
#
# Build infrastructure clones the public Luckfox board SDK at a pinned
# commit, lays the BR2_EXTERNAL tree from agents/lite-rs/buildroot/ on
# top, runs `make`, gzips the resulting microSD image, signs it with
# the lite-agent release Ed25519 keypair, and uploads to GitHub
# Releases. The full Buildroot run is a 30-60 minute job — that is
# fine because this workflow runs only on tagged image releases, not
# on every push.

name: luckfox-image-build

on:
  push:
    tags:
      - "lite-image-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Image version (without the lite-image-v prefix), e.g. 0.1.0"
        required: true
        default: "0.1.0-dev"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # Pinned Luckfox SDK commit. Bump deliberately when we want a newer
  # board kernel or BSP. The actions/cache key below is keyed on this
  # value, so a bump invalidates the cache and forces a fresh clone.
  LUCKFOX_SDK_REPO: "https://github.com/LuckfoxTECH/luckfox-pico"
  # Current HEAD of main (2026-03-22). Includes Pico Zero support landed
  # in upstream PR #310 (commit 9942437) plus subsequent backlight + BSP
  # fixes. Bump deliberately when we want a newer kernel or BSP.
  LUCKFOX_SDK_REF: "824b817f889c"
  # The defconfig name from the upstream Luckfox SDK that we layer
  # our BR2_EXTERNAL deltas on top of. The SDK ships per-board
  # defconfigs; `luckfox_pico_zero_buildroot_defconfig` is the closest
  # match for the Pico Zero target. If a future SDK rename moves it,
  # adjust this name in lockstep with the bump above.
  LUCKFOX_BASE_DEFCONFIG: "luckfox_pico_zero_buildroot_defconfig"

jobs:
  build:
    name: build flashable image
    runs-on: ubuntu-latest
    # 60 minutes covers a cold cache. Warm cache lands in ~25 min.
    timeout-minutes: 90

    # Lift signing secrets into job-level env so step-level `if:` can
    # read them. The same secret used by lite-agent-release.yml — both
    # the binary release pipeline and the image-build pipeline sign
    # with the same Ed25519 keypair so operators verify both with the
    # same vendored public key.
    env:
      MINISIGN_KEY: ${{ secrets.LITE_AGENT_MINISIGN_KEY }}
      MINISIGN_PASSWORD: ${{ secrets.LITE_AGENT_MINISIGN_PASSWORD }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/lite-image-v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/lite-image-v}"
          else
            VERSION="${{ github.event.inputs.version || '0.0.0-dev' }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libncurses5-dev libncurses-dev rsync bc cpio \
            python3 python3-pip unzip gzip xz-utils file wget git bison \
            flex minisign

      - name: Cache Luckfox SDK clone
        id: sdk-cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/luckfox-sdk
          # Keying on the pinned SHA means any bump of LUCKFOX_SDK_REF
          # invalidates the cache automatically. Cold clone takes
          # 5+ minutes; warm hits return in seconds.
          key: luckfox-sdk-${{ env.LUCKFOX_SDK_REF }}
          restore-keys: |
            luckfox-sdk-

      - name: Clone Luckfox SDK at pinned commit
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          set -eux
          mkdir -p "${{ runner.temp }}/luckfox-sdk"
          cd "${{ runner.temp }}/luckfox-sdk"
          # GitHub does not allow `git fetch <sha>` for arbitrary
          # commits on the public Luckfox repo (uploadpack.allow-
          # ReachableSHA1InWant is not set). Clone the default branch
          # and check out the pinned SHA from local history.
          git clone "${LUCKFOX_SDK_REPO}" .
          git checkout "${LUCKFOX_SDK_REF}"
          git submodule update --init --recursive --depth=1 || true

      - name: Verify SDK checkout
        run: |
          set -eux
          test -d "${{ runner.temp }}/luckfox-sdk"
          ls "${{ runner.temp }}/luckfox-sdk" | head -20

      - name: Locate or fall back to base defconfig
        id: defconfig
        run: |
          set -eu
          SDK_DIR="${{ runner.temp }}/luckfox-sdk"
          # The defconfig may live under sysdrv/source/buildroot/<ver>/configs/
          # in the Luckfox SDK layout. Resolve at runtime so an SDK
          # restructure doesn't silently break this workflow.
          PRIMARY="${LUCKFOX_BASE_DEFCONFIG}"
          BUILDROOT_DIR=$(find "${SDK_DIR}" -type d -name 'buildroot-*' -path '*sysdrv/source/buildroot*' | head -n1)
          if [ -z "${BUILDROOT_DIR}" ]; then
            BUILDROOT_DIR=$(find "${SDK_DIR}" -type d -name 'buildroot' | head -n1)
          fi
          if [ -z "${BUILDROOT_DIR}" ]; then
            echo "ERROR: Buildroot tree not found in Luckfox SDK" >&2
            exit 1
          fi
          echo "buildroot_dir=${BUILDROOT_DIR}" >> "$GITHUB_OUTPUT"
          if [ -f "${BUILDROOT_DIR}/configs/${PRIMARY}" ]; then
            CHOSEN="${PRIMARY}"
          else
            # Fall back to the closest Pico Zero / Pico class defconfig.
            CHOSEN=$(ls "${BUILDROOT_DIR}/configs/" | grep -iE 'luckfox.*pico.*zero.*defconfig' | head -n1 || true)
            if [ -z "${CHOSEN}" ]; then
              CHOSEN=$(ls "${BUILDROOT_DIR}/configs/" | grep -iE 'luckfox.*pico.*defconfig' | head -n1 || true)
            fi
          fi
          if [ -z "${CHOSEN}" ]; then
            echo "ERROR: no Luckfox Pico defconfig located in ${BUILDROOT_DIR}/configs/" >&2
            exit 1
          fi
          echo "Selected base defconfig: ${CHOSEN}"
          echo "name=${CHOSEN}" >> "$GITHUB_OUTPUT"

      - name: Configure Buildroot
        working-directory: ${{ steps.defconfig.outputs.buildroot_dir }}
        env:
          BR2_EXTERNAL: ${{ github.workspace }}/agents/lite-rs/buildroot
        run: |
          set -eux
          # 1. Start from the upstream Luckfox stock defconfig — this
          #    gives us the toolchain triplet, kernel headers, init
          #    system, rootfs format we deliberately do NOT duplicate
          #    in our delta file.
          make "${{ steps.defconfig.outputs.name }}"
          # 2. Append every selection from our delta defconfig and
          #    re-resolve. `olddefconfig` keeps existing answers and
          #    fills new ones with their defaults, which is exactly
          #    what we want for additive package selection.
          ADOS_DEFCONFIG="${{ github.workspace }}/agents/lite-rs/buildroot/configs/luckfox_pico_zero_ados_defconfig"
          if [ ! -f "${ADOS_DEFCONFIG}" ]; then
            echo "ERROR: ADOS defconfig not found at ${ADOS_DEFCONFIG}" >&2
            exit 1
          fi
          # Strip comments + blank lines so .config doesn't accumulate
          # noise; only real BR2_* settings get appended.
          grep -E '^[[:space:]]*BR2_' "${ADOS_DEFCONFIG}" >> .config
          yes "" | make olddefconfig
          # 3. Sanity-check the merge: every package we declared in
          #    the ADOS delta MUST be present in the resolved .config.
          for pkg in BR2_PACKAGE_ADOS_AGENT_LITE BR2_PACKAGE_ADOS_RKMPI_WRAPPER \
                     BR2_PACKAGE_RTL8812EU BR2_PACKAGE_AIC8800 \
                     BR2_PACKAGE_HOSTAPD BR2_PACKAGE_DNSMASQ; do
            if ! grep -qE "^${pkg}=y" .config; then
              echo "ERROR: ${pkg} did not survive olddefconfig merge" >&2
              grep "${pkg}" .config || true
              exit 1
            fi
          done
          echo "All ADOS packages selected in resolved .config."

      - name: Build image
        working-directory: ${{ steps.defconfig.outputs.buildroot_dir }}
        env:
          BR2_EXTERNAL: ${{ github.workspace }}/agents/lite-rs/buildroot
          # SDK_ROOT is consumed by the ados-rkmpi-wrapper package recipe,
          # which links against the closed-source Rockchip RKMPI library
          # using the SDK's pinned uclibc cross-toolchain. Without this
          # env var the wrapper build fails with a clear error rather
          # than silently producing an unbuildable host-toolchain link.
          SDK_ROOT: ${{ runner.temp }}/luckfox-sdk
        run: |
          set -eux
          # Buildroot's `make` is single-target by default; -j is
          # honored only when a per-package parallelism is configured.
          # We let Buildroot pick its own parallelism off the host's
          # nproc — this is what the upstream SDK docs recommend.
          make BR2_JLEVEL="$(nproc)"

      - name: Stage + post-process artifact
        id: stage
        env:
          BUILDROOT_DIR: ${{ steps.defconfig.outputs.buildroot_dir }}
        run: |
          set -eux
          VERSION="${{ steps.version.outputs.version }}"
          # Buildroot canonically writes the SD image to
          # output/images/sdcard.img. Some Luckfox SDK forks rename
          # it; resolve at runtime.
          IMG_SRC=$(ls "${BUILDROOT_DIR}/output/images/sdcard.img" \
                       "${BUILDROOT_DIR}/output/images/"*.img 2>/dev/null | head -n1)
          if [ -z "${IMG_SRC}" ] || [ ! -f "${IMG_SRC}" ]; then
            echo "ERROR: Buildroot did not produce an .img file in output/images/" >&2
            ls -lah "${BUILDROOT_DIR}/output/images/" || true
            exit 1
          fi
          ARTIFACT="ados-luckfox-pico-zero-${VERSION}.img.gz"
          # Run our own post-image script. It produces ${IMG_SRC}.gz +
          # ${IMG_SRC}.gz.sha256 idempotently. The Buildroot
          # BR2_ROOTFS_POST_IMAGE_SCRIPT in the defconfig may have
          # already done one pass; running it again is a no-op except
          # for refreshing the sha256 file.
          chmod +x "${GITHUB_WORKSPACE}/agents/lite-rs/buildroot/post-image.sh"
          "${GITHUB_WORKSPACE}/agents/lite-rs/buildroot/post-image.sh" "${IMG_SRC}"
          # Move the gzipped artifact to the workspace root with the
          # canonical artifact name expected by the release step.
          mv "${IMG_SRC}.gz" "${ARTIFACT}"
          sha256sum "${ARTIFACT}" > "${ARTIFACT}.sha256"
          echo "artifact=${ARTIFACT}" >> "$GITHUB_OUTPUT"
          ls -lah "${ARTIFACT}" "${ARTIFACT}.sha256"

      - name: Sign artifact (minisign Ed25519)
        # Same secret as lite-agent-release.yml so the vendored public
        # key in scripts/install-lite.sh verifies both the binary
        # release and the flashable image. The step-level `if:` gates
        # on the secret being set; forks without the secret skip
        # cleanly and upload an unsigned artifact via the warn path.
        if: ${{ env.MINISIGN_KEY != '' }}
        run: |
          set -eu
          ARTIFACT="${{ steps.stage.outputs.artifact }}"
          KEY_FILE="$(mktemp)"
          printf '%s' "${MINISIGN_KEY}" > "${KEY_FILE}"
          echo "${MINISIGN_PASSWORD}" | minisign -S -s "${KEY_FILE}" -m "${ARTIFACT}"
          shred -u "${KEY_FILE}"
          ls -l "${ARTIFACT}.minisig"

      - name: Build SHA256SUMS
        run: |
          set -eu
          ARTIFACT="${{ steps.stage.outputs.artifact }}"
          rm -f SHA256SUMS
          sha256sum "${ARTIFACT}" > SHA256SUMS
          if [ -f "${ARTIFACT}.minisig" ]; then
            sha256sum "${ARTIFACT}.minisig" >> SHA256SUMS
          fi
          cat SHA256SUMS

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/lite-image-v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: lite-image-v${{ steps.version.outputs.version }}
          name: Luckfox Pico Zero image ${{ steps.version.outputs.version }}
          # Don't fail the upload if a .minisig is absent (forks
          # without the signing secret produce an unsigned artifact).
          fail_on_unmatched_files: false
          files: |
            ${{ steps.stage.outputs.artifact }}
            ${{ steps.stage.outputs.artifact }}.sha256
            ${{ steps.stage.outputs.artifact }}.minisig
            SHA256SUMS
          body: |
            Flashable microSD image for the Luckfox Pico Zero.

            Verify before flashing:
              minisign -V -p <vendored-public-key> -m ados-luckfox-pico-zero-*.img.gz
              sha256sum -c SHA256SUMS

            Flash instructions: docs/oem/luckfox-pico-zero-flash-guide.md

      - name: Upload artifact (manual dispatch fallback)
        # Manual dispatch runs do not push a tag, so the Release step
        # is skipped. Drop the artifact onto the workflow run instead
        # so an operator running a one-off rebuild can grab it.
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: ados-luckfox-pico-zero-${{ steps.version.outputs.version }}
          path: |
            ${{ steps.stage.outputs.artifact }}
            ${{ steps.stage.outputs.artifact }}.sha256
            ${{ steps.stage.outputs.artifact }}.minisig
            SHA256SUMS
          if-no-files-found: warn
          retention-days: 14
