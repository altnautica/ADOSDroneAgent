          minisign -S -s /tmp/sign.key -m rel/ados-supervisor-aarch64 -x rel/ados-supervisor-aarch64.minisig
          rm -f /tmp/sign.key

      - name: Publish rolling prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: prebuilt-supervisor
          prerelease: true
          name: "Prebuilt ados-supervisor (rolling)"
          files: crates/rel/*

