  publish-logd:
    needs: build-test
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (musl target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Install zig
        uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Build static ados-logd (bundled SQLite + zstd via zig)
        run: cargo zigbuild --release --target aarch64-unknown-linux-musl -p ados-logd

      - name: Stage artifact + checksum
        run: |
          set -euo pipefail
          mkdir -p rel
          cp target/aarch64-unknown-linux-musl/release/ados-logd rel/ados-logd-aarch64
          ( cd rel && sha256sum ados-logd-aarch64 > ados-logd-aarch64.sha256 )

      - name: Sign artifact (only when the signing key is present)
        env:
          SIGNING_KEY: ${{ secrets.ADOS_DRIVER_SIGNING_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SIGNING_KEY}" ]; then
            echo "No ADOS_DRIVER_SIGNING_KEY set; publishing SHA256-only (dev posture)."
            exit 0
          fi
          sudo apt-get update && sudo DEBIAN_FRONTEND=noninteractive apt-get install -y minisign
          printf '%s' "${SIGNING_KEY}" > /tmp/sign.key
          minisign -S -s /tmp/sign.key -m rel/ados-logd-aarch64 -x rel/ados-logd-aarch64.minisig
          rm -f /tmp/sign.key

      - name: Publish rolling prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: prebuilt-logd
          prerelease: true
          name: "Prebuilt ados-logd (rolling)"
          files: crates/rel/*

  # Mirror the upstream mediamtx (the video relay the installer fetches via the
  # prebuilt-binary catalog) into a rolling prerelease, arch-named to match the
  # catalog asset (`mediamtx-aarch64`). Self-hosting the mirror means the install
  # never depends on a third-party release staying available. Runs only on pushes
  # to main. Artifact carries a SHA256; signing follows the same key-gated path.
  publish-mediamtx:
    needs: build-test
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    env:
      MEDIAMTX_VERSION: v1.17.1
    steps:
      - uses: actions/checkout@v4

      - name: Fetch + stage mediamtx (arm64)
        run: |
          set -euo pipefail
          mkdir -p rel work
          url="https://github.com/bluenviron/mediamtx/releases/download/${MEDIAMTX_VERSION}/mediamtx_${MEDIAMTX_VERSION}_linux_arm64.tar.gz"
          curl -fsSL --connect-timeout 10 --max-time 180 --retry 3 --retry-delay 2 "$url" -o work/mediamtx.tar.gz
          tar -xzf work/mediamtx.tar.gz -C work mediamtx
          install -m 0755 work/mediamtx rel/mediamtx-aarch64
          ( cd rel && sha256sum mediamtx-aarch64 > mediamtx-aarch64.sha256 )

      - name: Sign artifact (only when the signing key is present)
        env:
          SIGNING_KEY: ${{ secrets.ADOS_DRIVER_SIGNING_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SIGNING_KEY}" ]; then
            echo "No ADOS_DRIVER_SIGNING_KEY set; publishing SHA256-only (dev posture)."
            exit 0
          fi
          sudo apt-get update && sudo DEBIAN_FRONTEND=noninteractive apt-get install -y minisign
          printf '%s' "${SIGNING_KEY}" > /tmp/sign.key
          minisign -S -s /tmp/sign.key -m rel/mediamtx-aarch64 -x rel/mediamtx-aarch64.minisig
          rm -f /tmp/sign.key

      - name: Publish rolling prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: prebuilt-mediamtx
          prerelease: true
          name: "Prebuilt mediamtx (mirrored)"
          files: crates/rel/*
