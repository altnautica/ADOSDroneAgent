  # Build the vision engine WITH the ONNX Runtime backend (--features onnx) and
  # publish it as a distinct asset the installer fetches for CPU-strong, NPU-less
  # boards (those whose board profile declares compute.local_inference: onnx), so
  # they run the detector on the CPU out of the box. Unlike every other prebuilt
  # this is NOT a static musl binary: ONNX Runtime has no aarch64-musl prebuilt
  # (a --features onnx build cannot link musl), so this ships as a glibc (gnu)
  # binary that statically embeds ONNX Runtime. Built NATIVELY with the GNU
  # toolchain (the toolchain the ONNX Runtime static lib was built with — a native
  # link avoids the C++ ABI mismatch a cross linker would hit) on ubuntu-22.04-arm
  # so the glibc floor is 2.35, old enough for the target boards' Debian 12 /
  # Raspberry Pi OS Bookworm (glibc 2.36). The onnx gnu build is already exercised
  # by the build-test job's `--all-features` release build; this only re-builds it
  # on the older-glibc runner and publishes it. Runs only on pushes to main.
  publish-vision-onnx:
    needs: build-test
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-22.04-arm
    # The onnx backend loads the ONNX Runtime dynamically (the crate's
    # `load-dynamic` feature), so the compiled binary carries no link-time
    # dependency on the runtime's glibc/libstdc++ and builds cleanly on this
    # runner. The runtime shared library is shipped separately: an official
    # aarch64 build whose glibc floor is well below the Bookworm target, fetched
    # by the installer to a fixed path and handed to the binary via
    # ORT_DYLIB_PATH. The runtime version must match the ABI the `ort` crate
    # targets — bump it here in lockstep with the `ort` dependency.
    env:
      ORT_RUNTIME_VERSION: "1.24.2"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build ados-vision with the onnx backend (dynamic load)
        run: cargo build --release --features onnx -p ados-vision

      - name: Fetch the ONNX Runtime shared library (official aarch64 build)
        run: |
          set -euo pipefail
          ver="${ORT_RUNTIME_VERSION}"
          tarball="onnxruntime-linux-aarch64-${ver}.tgz"
          url="https://github.com/microsoft/onnxruntime/releases/download/v${ver}/${tarball}"
          curl -fSL --retry 3 -o "${tarball}" "${url}"
          tar -xzf "${tarball}"
          # The tarball ships lib/libonnxruntime.so.<ver> plus a versionless
          # symlink; publish the real (dereferenced) shared object.
          cp -L "onnxruntime-linux-aarch64-${ver}/lib/libonnxruntime.so" libonnxruntime-aarch64.so
          file libonnxruntime-aarch64.so

      - name: Stage artifacts + checksums
        run: |
          set -euo pipefail
          mkdir -p rel
          cp target/release/ados-vision rel/ados-vision-onnx-aarch64
          cp libonnxruntime-aarch64.so rel/libonnxruntime-aarch64.so
          ( cd rel && sha256sum ados-vision-onnx-aarch64 > ados-vision-onnx-aarch64.sha256 )
          ( cd rel && sha256sum libonnxruntime-aarch64.so > libonnxruntime-aarch64.so.sha256 )

      - name: Sign artifacts (only when the signing key is present)
        env:
          SIGNING_KEY: ${{ secrets.ADOS_DRIVER_SIGNING_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SIGNING_KEY}" ]; then
            echo "No ADOS_DRIVER_SIGNING_KEY set; publishing SHA256-only (dev posture)."
            exit 0
          fi
          # This job builds on the older-glibc runner (so the binary runs on the
          # Bookworm target boards); minisign is not packaged for that runner's
          # apt, so signing degrades to SHA256-only there rather than failing the
          # publish. On edge (the default channel) the installer accepts SHA256;
          # the signed artifacts on the newer-glibc jobs are unaffected.
          sudo apt-get update || true
          if ! sudo DEBIAN_FRONTEND=noninteractive apt-get install -y minisign; then
            echo "minisign unavailable on this runner; publishing SHA256-only."
            exit 0
          fi
          printf '%s' "${SIGNING_KEY}" > /tmp/sign.key
          minisign -S -s /tmp/sign.key -m rel/ados-vision-onnx-aarch64 -x rel/ados-vision-onnx-aarch64.minisig
          minisign -S -s /tmp/sign.key -m rel/libonnxruntime-aarch64.so -x rel/libonnxruntime-aarch64.so.minisig
          rm -f /tmp/sign.key

      - name: Publish rolling prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: prebuilt-vision-onnx
          prerelease: true
          name: "Prebuilt ados-vision (onnx, rolling)"
          files: crates/rel/*

