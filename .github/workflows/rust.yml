name: Rust

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "src/ados/plugins/_capabilities_generated.py"
      - "src/ados/plugins/_dispatch_generated.py"
      - "src/ados/services/wfb/_wfb_tables_generated.py"
      - "src/ados/core/_contracts_generated.py"
      - ".github/workflows/rust.yml"
  pull_request:
    branches: [main]
    paths:
      - "crates/**"
      - "src/ados/plugins/_capabilities_generated.py"
      - "src/ados/plugins/_dispatch_generated.py"
      - "src/ados/services/wfb/_wfb_tables_generated.py"
      - "src/ados/core/_contracts_generated.py"
      - ".github/workflows/rust.yml"

# Default to read-only so the build-test job (which runs on pull requests, i.e.
# fork-controlled code) never holds a release-write token. Only publish-tui
# elevates to contents: write, and it runs only on pushes to main.
permissions:
  contents: read

defaults:
  run:
    working-directory: crates

jobs:
  build-test:
    # Native arm64 so the build and tests run on the same architecture as the
    # target boards (Rock 5C, Pi 4B); no cross-compile needed.
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          # The static target the prebuilt binaries ship as. Linting against it
          # catches Linux/musl-only lints (nix, flock, setsid) the host target
          # cannot surface, so both targets are part of the code-ready gate.
          targets: aarch64-unknown-linux-musl

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/target
          key: arm64-cargo-${{ hashFiles('crates/Cargo.lock') }}
          restore-keys: arm64-cargo-

      - name: Format check
        run: cargo fmt --check

      - name: Clippy (host target, all features)
        run: cargo clippy --all-targets --all-features -- -D warnings

      # Some crates carry bundled C (SQLite, zstd) and — via rerun's
      # re_redap_client, pulled transitively through ados-compute — ring, whose
      # build script needs an aarch64-linux-musl C compiler. zig cc is that
      # compiler (the same tech cargo-zigbuild uses for the publish jobs);
      # exposing it under the target-triple name cc-rs looks for lets the musl
      # clippy build every crate's C without a per-crate exclude whack-a-mole.
      - name: Install zig (musl C cross-compiler for clippy build scripts)
        uses: mlugg/setup-zig@v2

      - name: Expose zig as the aarch64-linux-musl C toolchain
        run: |
          set -eu
          sudo tee /usr/local/bin/aarch64-linux-musl-gcc >/dev/null <<'EOF'
          #!/usr/bin/env bash
          # cc-rs passes --target=<rust-triple> (aarch64-unknown-linux-musl),
          # which zig's clang driver rejects (it wants its own arch-os-abi form).
          # Drop it; the -target below is the zig-form target for this cross build.
          args=()
          for a in "$@"; do
            [[ "$a" == --target=* ]] && continue
            args+=("$a")
          done
          exec zig cc -target aarch64-linux-musl "${args[@]}"
          EOF
          sudo tee /usr/local/bin/aarch64-linux-musl-ar >/dev/null <<'EOF'
          #!/usr/bin/env bash
          exec zig ar "$@"
          EOF
          sudo chmod +x /usr/local/bin/aarch64-linux-musl-gcc /usr/local/bin/aarch64-linux-musl-ar

      # The musl prebuilts ship default features. The onnx backend pulls ort,
      # which has no aarch64-musl prebuilt, so --all-features cannot target
      # musl; the host clippy above already covers the onnx path.
      - name: Clippy (aarch64-musl target, default features)
        # ados-logd, ados-cloud, and ados-compute carry bundled C (SQLite, zstd,
        # and — via rerun's re_redap_client — ring) and are excluded here: the
        # host clippy above already lint-covers them, and clippy compiles build
        # scripts which would need the C cross-compiler. ados-plugin-host is also
        # excluded because it depends on ados-compute, so linting it drags the
        # same bundled C in transitively. Their musl cross-builds are proven by
        # the zig steps below.
        run: cargo clippy --all-targets --target aarch64-unknown-linux-musl --workspace --exclude ados-logd --exclude ados-cloud --exclude ados-compute --exclude ados-plugin-host -- -D warnings

      - name: Test (default features)
        run: cargo test

      - name: Test (all features)
        run: cargo test --all-features

      - name: Capability catalog + contract registry drift check
        run: cargo run -q -p ados-capabilities-codegen -- --check

      - name: Release build (arm64)
        run: cargo build --release --all-features

  # Build the terminal dashboard as a static arm64 binary and publish it to a
  # rolling prerelease the installer fetches. Static (musl) so one binary runs
  # on every supported board regardless of its glibc. Runs only on pushes to
  # main, not pull requests. Artifact carries a SHA256; a minisign .minisig is signed when ADOS_DRIVER_SIGNING_KEY is set.
  publish-tui:
    needs: build-test
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (musl target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build static ados-tui
        run: cargo build --release --target aarch64-unknown-linux-musl -p ados-tui

      - name: Stage artifact + checksum
        run: |
          set -euo pipefail
          mkdir -p rel
          cp target/aarch64-unknown-linux-musl/release/ados-tui rel/ados-tui-aarch64
          ( cd rel && sha256sum ados-tui-aarch64 > ados-tui-aarch64.sha256 )

      - name: Sign artifact (only when the signing key is present)
        env:
          SIGNING_KEY: ${{ secrets.ADOS_DRIVER_SIGNING_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SIGNING_KEY}" ]; then
            echo "No ADOS_DRIVER_SIGNING_KEY set; publishing SHA256-only (dev posture)."
            exit 0
          fi
          sudo apt-get update && sudo DEBIAN_FRONTEND=noninteractive apt-get install -y minisign
          printf '%s' "${SIGNING_KEY}" > /tmp/sign.key
          minisign -S -s /tmp/sign.key -m rel/ados-tui-aarch64 -x rel/ados-tui-aarch64.minisig
          rm -f /tmp/sign.key

      - name: Publish rolling prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: prebuilt-tui
          prerelease: true
          name: "Prebuilt ados-tui (rolling)"
          files: crates/rel/*

