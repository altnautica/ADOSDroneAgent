[package]
name = "ados-cloud"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Cloud relay client (MQTT + HTTPS heartbeat) for the lite ADOS Drone Agent"

[dependencies]
ados-setup = { path = "../ados-setup" }
tokio = { workspace = true }
rumqttc = { workspace = true }
reqwest = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
chrono = { workspace = true }
sysinfo = { workspace = true }

[dev-dependencies]
# Mock HTTP server for end-to-end tests of the heartbeat loop.
wiremock = "0.6"
tempfile = "3"
tokio = { workspace = true, features = ["macros", "rt", "sync", "io-util", "net", "time", "signal", "process", "rt-multi-thread"] }
