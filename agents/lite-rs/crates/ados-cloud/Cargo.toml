[package]
name = "ados-cloud"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Cloud relay client (MQTT + HTTPS heartbeat) for the lite ADOS Drone Agent"

[dependencies]
ados-setup = { path = "../ados-setup" }
tokio = { workspace = true }
rumqttc = { workspace = true }
reqwest = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
chrono = { workspace = true }
sysinfo = { workspace = true }
# Bounded request-ID dedup cache for cloud command idempotency. Pinned
# to 0.12 to match the broader workspace's 2024-era ecosystem and
# avoid pulling a newer hashbrown into the resolution graph.
lru = "0.12"

# Reboot syscall surface. Linux-only; the lite agent does not target
# other Unixes. Kept as a target-gated dep so `cargo test` on a dev's
# macOS workstation still compiles the crate (the non-Linux fallback
# in `handlers::SystemRebootProvider` returns Unsupported instead of
# rebooting).
[target.'cfg(target_os = "linux")'.dependencies]
nix = { version = "0.29", default-features = false, features = ["reboot"] }

[dev-dependencies]
# Mock HTTP server for end-to-end tests of the heartbeat loop.
wiremock = "0.6"
tempfile = "3"
tokio = { workspace = true, features = ["macros", "rt", "sync", "io-util", "net", "time", "signal", "process", "rt-multi-thread"] }
ados-test-mocks = { path = "../ados-test-mocks" }
