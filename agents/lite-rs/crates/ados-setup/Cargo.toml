[package]
name = "ados-setup"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Universal setup REST surface for the lightweight ADOS Drone Agent"

[dependencies]
tokio = { workspace = true }
axum = { workspace = true, features = ["http1", "json", "ws"] }
serde = { workspace = true }
serde_yaml = { workspace = true }
serde_json = { workspace = true }
reqwest = { workspace = true }
tracing = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
chrono = { workspace = true }
# Embed the universal setup webapp (web/setup/) into the binary at
# compile time so the lite agent can serve the wizard with no
# runtime filesystem dependency.
include_dir = "0.7"
# Crypto-secure random for pairing code + API key generation.
rand = { version = "0.8", default-features = false, features = ["std", "std_rng"] }
# URL-safe base64 (no padding) for API keys, matching Python's
# `secrets.token_urlsafe(32)`.
base64 = "0.22"
# SHA-256 for cloudflared release-asset integrity verification.
sha2 = "0.10"
# WFB-ng orchestration surface (REST handlers shared with the agent).
ados-wfb = { path = "../ados-wfb" }

[dev-dependencies]
tempfile = "3"
tower = "0.5"
http-body-util = "0.1"
