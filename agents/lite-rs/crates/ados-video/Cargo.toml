[package]
name = "ados-video"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Hardware-encoded H.264 video pipeline for the lite ADOS Drone Agent"

[dependencies]
tokio = { workspace = true }
# `tokio-util` is workspace-pinned; we add the `rt` feature here so the
# supervisor module can use `CancellationToken` without dragging the
# feature flag onto every other consumer of the workspace crate.
tokio-util = { workspace = true, features = ["rt"] }
serde = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
async-trait = { workspace = true }
rmp-serde = { workspace = true }
bytes = { workspace = true }

# V4L2 high-level wrapper. The crate's own surface is safe; the unsafe
# ioctl boundary is contained inside its `v4l-sys` dep, so the
# `ados-video` crate keeps its `forbid(unsafe_code)` posture.
[target.'cfg(target_os = "linux")'.dependencies]
v4l = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt", "sync", "io-util", "net", "time", "signal", "process", "rt-multi-thread"] }
# Per-test sandboxes for the supervisor integration tests — each test
# writes a small fake wrapper binary into a tempdir, invokes the
# supervisor against it, and lets `TempDir::drop` clean up.
tempfile = "3"
# Integration tests build msgpack response frames at test time so the
# bytes track any change to the wire format without a hand-edit.
rmp-serde = { workspace = true }
# CancellationToken is exercised from the integration tests, not just
# the lib; promote the dep to dev-deps so the tests compile without
# pulling the lib's `[dependencies]` block into doc-test scope.
tokio-util = { workspace = true, features = ["rt"] }
# In-process RTSP server fixture for the round-trip integration test.
# Lets the suite drive `run_push_loop` against a real loopback socket
# without needing an external mediamtx instance.
ados-test-mocks = { path = "../ados-test-mocks" }
