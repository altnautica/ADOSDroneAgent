[package]
name = "ados-wfb"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "WFB-ng air-side orchestration (dongle hot-plug, key derivation, wfb_tx subprocess) for the lite ADOS Drone Agent"

[features]
default = []
# Exposes the in-memory mock udev source so tests can drive add/remove
# events without touching /sys.
mock = []

[dependencies]
tokio = { workspace = true, features = ["fs"] }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }

# Shared low-level primitives (atomic file write).
ados-core = { path = "../ados-core" }

# Encoded H.264 frame type produced by the agent's video pipeline. The
# wfb manager exposes a tee that consumes the broadcast channel of
# `EncodedFrame`s and writes the Annex-B byte stream into the running
# `wfb_tx` subprocess's stdin.
ados-video = { path = "../ados-video" }

# Curve25519 + AEAD + SHA-256 for the WFB-ng broadcast key derivation.
# All three live in the workspace deps so `ados-wfb` and any future
# crate that needs the same crypto primitives pin identical versions.
x25519-dalek = { workspace = true }
chacha20poly1305 = { workspace = true }
sha2 = { workspace = true }

# OS-entropy RNG for the regenerate-key REST handler. The `getrandom`
# feature pins to /dev/urandom on Linux + Security.Framework on macOS so
# the dev host CI builds and the Buildroot target both read from the
# same kernel-blessed source.
rand_core = { version = "0.6", features = ["getrandom"] }

[dev-dependencies]
tempfile = "3"
tokio = { workspace = true, features = ["macros", "rt", "sync", "io-util", "net", "time", "signal", "process", "rt-multi-thread", "fs"] }

# Real udev netlink monitor on Linux. The crate links libudev which is
# Linux-only, so the dep is target-gated so `ados-wfb` still compiles
# cleanly on macOS dev hosts where the polling SysfsUdev backend is the
# only path. The udev backend lives behind `#[cfg(target_os = "linux")]`
# in `udev.rs` and the factory function picks the right one.
[target.'cfg(target_os = "linux")'.dependencies]
udev = "0.9"
tokio-stream = "0.1"
