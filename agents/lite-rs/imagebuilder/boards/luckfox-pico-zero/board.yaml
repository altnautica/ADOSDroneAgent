slug: luckfox-pico-zero
name: "Luckfox Pico Zero"
soc: "RV1106G3"
arch: armv7l
libc: uclibc
init_system: busybox-sysv-rc
target_triple: armv7-unknown-linux-musleabihf

sdk:
  type: luckfox-vendor
  repo: "https://github.com/LuckfoxTECH/luckfox-pico"
  ref: "824b817f889c"
  lunch_target: "RV1106_Luckfox_Pico_Zero"

# RAM minimum below which a board cannot host the full agent and must
# auto-select the lite profile. The Luckfox Pico Zero ships 256 MiB
# DDR3L; the lite agent baseline RSS is ~3-4 MiB and headroom across
# the full v1 feature surface (MAVLink, cloud relay, video pipeline,
# WFB-ng) tops out near 185 MiB.
compute:
  min_ram_mb: 256

# Out-of-tree kernel modules cross-built by drivers/<name>/recipe.sh
# against the SDK kernel and dropped into the rootfs in post_overlay.
drivers:
  - name: rtl8812eu
    upstream: "github:aircrack-ng/rtl8812au"
    ref: "7344855"
    install_path: "lib/modules/${KVER}/extra/88XXau.ko"
  - name: aic8800
    upstream: "github:radxa-pkg/aic8800"
    ref: "7f42b22913b462ab6c658dfc075bae1dbfe9a71a"
    install_path: "lib/modules/${KVER}/extra/aic8800_fdrv.ko"

# Proprietary firmware blobs copied into the rootfs by the aic8800
# driver recipe at install time. The blobs ship under their upstream
# Aicsemi redistribution terms; they are required for the on-board
# Wi-Fi 6 radio to associate.
firmware:
  - source: "github:radxa-pkg/aic8800@7f42b22913b462ab6c658dfc075bae1dbfe9a71a"
    src_path: "src/USB/driver_fw/fw/aic8800DC/"
    dest_path: "lib/firmware/aic8800DC/"
    license: "proprietary, redistribution under upstream Aicsemi terms"
