# Single-source-of-truth board matrix consumed by the
# image-build.yml CI workflow (and by `build-driver.sh --list`).
#
# Adding a new board is a 1-PR change:
#   1. Drop boards/<slug>/{recipe.sh, board.yaml}
#   2. Append a new entry below
#   3. CI picks up the new slug on the next lite-image-v* tag push

boards:
  - slug: luckfox-pico-zero
    triple: armv7-unknown-linux-musleabihf
    sdk_family: luckfox-vendor
    cold_minutes: 75      # estimated CI minutes on cold cache
    warm_minutes: 30

  - slug: pi-zero-2w
    triple: aarch64-unknown-linux-gnu
    sdk_family: pi-gen
    cold_minutes: 45
    warm_minutes: 20
