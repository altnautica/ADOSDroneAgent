# Lite agent profile manifest. Read by the installer to dispatch the
# correct binary, by the setup webapp wizard to populate the profile
# picker, and by CI to drive the release-artifact matrix.

profile: lite
language: rust
version: "0.1.0"
description: "Lightweight air-side companion for low-RAM SBCs. Single static binary, control-plane only at v0.1 (MAVLink router + cloud relay client + REST API stub). Video, WFB-ng, and full setup webapp REST handlers ship in subsequent versions."

# Cross-compile targets produced by CI. Each becomes a release-tarball variant.
archs:
  - aarch64-unknown-linux-gnu
  - aarch64-unknown-linux-musl
  - armv7-unknown-linux-musleabihf
  - x86_64-unknown-linux-musl

# Resource floor.
min_ram_mb: 96

# Feature surface at v0.1.
features:
  - mavlink_router
  - cloud_mqtt
  - cloud_https
  - rest_api

# Hardware suggestions for the wizard auto-detect.
hardware_hints:
  recommended_socs:
    - bcm2710a1
    - rv1106
    - rv1103
  ram_threshold_mb: 384
  description: "Wizard pre-selects this profile when detected RAM is at or below 384 MB. Always shown as a manual choice regardless."

# Release-artifact configuration.
binary:
  name: ados-agent-lite
  release_artifact_pattern: "ados-agent-lite-{version}-{target}.tar.gz"
  signing: ed25519-minisign
  public_key_path: "/etc/ados/keys/lite-agent-release.pub"
