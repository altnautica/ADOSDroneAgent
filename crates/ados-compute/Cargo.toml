[package]
name = "ados-compute"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Compute-node engine: a SQLite-backed job store, a queue and scheduler, the reconstructor and perception-offload traits with mock backends, and the master/slave cluster. The heavy-compute substrate a drone or GCS pairs with to run reconstruction and perception offload."

[lib]
name = "ados_compute"
path = "src/lib.rs"

[[bin]]
name = "ados-compute"
path = "src/bin/ados-compute.rs"

[dependencies]
# `tracing-layer` pulls in the LogdLayer so the daemon's logs reach the durable
# ados-logd Black Box store, not just journald (Rule 41).
ados-protocol = { path = "../ados-protocol", features = ["tracing-layer"] }
rusqlite = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-journald = { workspace = true }
# The job API is served on a single TCP listener (loopback until auth ships),
# the same axum-over-tokio surface the logging daemon uses.
tokio = { workspace = true }
axum = { workspace = true }
# The compute-offload client (the agent-side caller of this node's job API).
# Local-first plain HTTP on the LAN; the workspace's reqwest is unified onto the
# no-provider rustls path (ados-cloud), so the client builder calls the shared
# ados_protocol::crypto::ensure_crypto_provider() first or build() panics
# ("No provider set").
reqwest = { version = "0.12", default-features = false, features = ["json"] }
# mDNS advertisement so a compute node auto-appears in the GCS Add-a-Node card
# for LAN pairing (Rule 39) from boot, like a drone/ground-station. The Python
# `ados-discovery` advert is OnDemand (only runs while a pairing code is live),
# so this always-on Rust advert is what makes the node discoverable at boot.
mdns-sd = "0.13"

[dev-dependencies]
# `ServiceExt::oneshot` drives the router in tests without binding a port.
tower = { workspace = true, features = ["util"] }
# Temp pairing.json files for the auth-gate tests.
tempfile = "3"
# The SITL gate harness wires the transport lane (the bearer + the event router)
# to the compute engine end-to-end in-process.
ados-atlas-transport = { path = "../ados-atlas-transport" }
axum = { workspace = true }
