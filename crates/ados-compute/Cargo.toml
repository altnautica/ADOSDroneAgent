[package]
name = "ados-compute"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Compute-node engine: a SQLite-backed job store, a queue and scheduler, the reconstructor and perception-offload traits with mock backends, and the master/slave cluster. The heavy-compute substrate a drone or GCS pairs with to run reconstruction and perception offload."

[lib]
name = "ados_compute"
path = "src/lib.rs"

[[bin]]
name = "ados-compute"
path = "src/bin/ados-compute.rs"

[dependencies]
# `tracing-layer` pulls in the LogdLayer so the daemon's logs reach the durable
# ados-logd Black Box store, not just journald (Rule 41).
ados-protocol = { path = "../ados-protocol", features = ["tracing-layer"] }
rusqlite = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-journald = { workspace = true }
# The job API is served on a single TCP listener (loopback until auth ships),
# the same axum-over-tokio surface the logging daemon uses.
tokio = { workspace = true }
axum = { workspace = true }

[dev-dependencies]
# `ServiceExt::oneshot` drives the router in tests without binding a port.
tower = { workspace = true, features = ["util"] }
