# ADOS plugin runtime sockets and runtime state
d /run/ados/plugins 0750 ados ados -
# Sweep stale plugin UDS files on boot. The supervisor unlinks on
# clean shutdown but a hard kill or power loss leaves the socket
# inode behind, blocking the next bind(). systemd-tmpfiles handles
# the boot-time cleanup so the supervisor can rely on a clean dir.
r! /run/ados/plugins/*.sock
