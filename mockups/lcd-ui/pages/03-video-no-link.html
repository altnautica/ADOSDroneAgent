<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>03 — Video (no link)</title>
<link rel="stylesheet" href="../styles.css">
</head>
<body>
<div class="screen">

  <div class="top-bar">
    <span class="hostname">groundnode</span>
    <span class="role unset">
      <span class="dot"></span>
      RECEIVER
    </span>
    <div class="sysmetrics">
      <span class="pair"><span class="label">CPU</span><span class="val">14%</span></span>
      <span class="pair"><span class="label">RAM</span><span class="val">1.1/4G</span></span>
      <span class="pair"><span class="label">T</span><span class="val">39°C</span></span>
    </div>
    <span class="clock">14:32:08</span>
  </div>

  <div class="content">

    <div class="video-region">
      <div class="video-no-link">
        <div class="glyph">⌀</div>
        <div class="title">Video link not available</div>
        <div class="hint">no paired drone · waiting for stream on rtsp://127.0.0.1:8554/main</div>
      </div>
    </div>

    <div class="metrics-strip" style="opacity: 0.4;">
      <div class="metric"><span class="lbl">latency</span><span class="val">—</span></div>
      <div class="metric"><span class="lbl">rssi</span><span class="val">—</span></div>
      <div class="metric"><span class="lbl">bitrate</span><span class="val">—</span></div>
      <div class="metric"><span class="lbl">FEC drops</span><span class="val">—</span></div>
      <div class="metric"><span class="lbl">fps</span><span class="val">—</span></div>
      <div class="metric"><span class="lbl">channel</span><span class="val">5745 · MCS 3</span></div>
    </div>

  </div>

  <div class="tab-bar">
    <div class="tab">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
    </div>
    <div class="tab active">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="6" width="14" height="12" rx="2"/><path d="M16 10l5-3v10l-5-3z"/>
      </svg>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="7" x2="21" y2="7"/>
        <circle cx="9" cy="7" r="2"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <circle cx="15" cy="12" r="2"/>
        <line x1="3" y1="17" x2="21" y2="17"/>
        <circle cx="7" cy="17" r="2"/>
      </svg>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </div>
  </div>

</div>
</body>
</html>
