<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>04 — Settings (root)</title>
<link rel="stylesheet" href="../styles.css">
</head>
<body>
<div class="screen">

  <div class="top-bar">
    <span class="hostname">groundnode</span>
    <span class="role">
      <span class="dot"></span>
      RECEIVER
    </span>
    <div class="sysmetrics">
      <span class="pair"><span class="label">CPU</span><span class="val">18%</span></span>
      <span class="pair"><span class="label">RAM</span><span class="val">1.2/4G</span></span>
      <span class="pair"><span class="label">T</span><span class="val">42°C</span></span>
    </div>
    <span class="clock">14:32:08</span>
  </div>

  <div class="content">
    <div class="settings-list">

      <div class="row">
        <span class="icon">
          <svg viewBox="0 0 24 24"><path d="M5 12.5a10 10 0 0 1 14 0"/><path d="M8.5 16a5 5 0 0 1 7 0"/><circle cx="12" cy="19" r="1.2" fill="currentColor"/></svg>
        </span>
        <span class="label">Wi-Fi hotspot</span>
        <span class="value">groundnode-AP</span>
        <span class="chevron">›</span>
      </div>

      <div class="row toggle">
        <span class="icon">
          <svg viewBox="0 0 24 24"><path d="M9 4l-3 7 3 9 6-9-3-7zm0 0h6"/></svg>
        </span>
        <span class="label">Hotspot enabled</span>
        <span class="switch on"></span>
      </div>

      <div class="row">
        <span class="icon">
          <svg viewBox="0 0 24 24"><path d="M12 4v6"/><path d="M8 8l-2 12h12L16 8"/><circle cx="12" cy="12" r="2"/></svg>
        </span>
        <span class="label">Channel</span>
        <span class="value">5745 MHz · 20</span>
        <span class="chevron">›</span>
      </div>

      <div class="row">
        <span class="icon">
          <svg viewBox="0 0 24 24"><path d="M13 3L4 14h7l-1 7 9-11h-7l1-7z" fill="currentColor" stroke="none"/></svg>
        </span>
        <span class="label">TX power</span>
        <span class="value">5 dBm</span>
        <span class="chevron">›</span>
      </div>

      <div class="row">
        <span class="icon">
          <svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3"/><path d="M3 19a6 6 0 0 1 12 0"/><circle cx="17" cy="10" r="2"/><path d="M14 19a4 4 0 0 1 8 0"/></svg>
        </span>
        <span class="label">Role</span>
        <span class="value">Receiver</span>
        <span class="chevron">›</span>
      </div>

    </div>
  </div>

  <div class="tab-bar">
    <div class="tab">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="6" width="14" height="12" rx="2"/><path d="M16 10l5-3v10l-5-3z"/>
      </svg>
    </div>
    <div class="tab active">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="7" x2="21" y2="7"/>
        <circle cx="9" cy="7" r="2"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <circle cx="15" cy="12" r="2"/>
        <line x1="3" y1="17" x2="21" y2="17"/>
        <circle cx="7" cy="17" r="2"/>
      </svg>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </div>
  </div>

</div>
</body>
</html>
