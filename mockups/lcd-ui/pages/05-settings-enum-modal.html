<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>05 — Settings enum modal</title>
<link rel="stylesheet" href="../styles.css">
</head>
<body>
<div class="screen">

  <div class="top-bar">
    <span class="hostname">groundnode</span>
    <span class="role">
      <span class="dot"></span>
      RECEIVER
    </span>
    <div class="sysmetrics">
      <span class="pair"><span class="label">CPU</span><span class="val">18%</span></span>
      <span class="pair"><span class="label">RAM</span><span class="val">1.2/4G</span></span>
      <span class="pair"><span class="label">T</span><span class="val">42°C</span></span>
    </div>
    <span class="clock">14:32:08</span>
  </div>

  <div class="content">
    <!-- Background settings list (dimmed by modal) -->
    <div class="settings-list" style="filter: brightness(0.4);">
      <div class="row"><span class="icon"></span><span class="label">Wi-Fi hotspot</span><span class="value">groundnode-AP</span><span class="chevron">›</span></div>
      <div class="row"><span class="icon"></span><span class="label">Hotspot enabled</span><span class="value">on</span></div>
      <div class="row"><span class="icon"></span><span class="label">Channel</span><span class="value">5745 MHz</span><span class="chevron">›</span></div>
      <div class="row"><span class="icon"></span><span class="label">TX power</span><span class="value">5 dBm</span><span class="chevron">›</span></div>
    </div>

    <!-- Modal -->
    <div class="modal">
      <div class="header">
        <span class="back">‹</span>
        <span class="title">Channel</span>
      </div>
      <div class="options">
        <div class="opt">5180 MHz · ch 36</div>
        <div class="opt">5260 MHz · ch 52</div>
        <div class="opt">5500 MHz · ch 100</div>
        <div class="opt">
          5745 MHz · ch 149
          <span class="check">✓</span>
        </div>
        <div class="opt">5825 MHz · ch 165</div>
      </div>
    </div>
  </div>

  <div class="tab-bar">
    <div class="tab">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="6" width="14" height="12" rx="2"/><path d="M16 10l5-3v10l-5-3z"/>
      </svg>
    </div>
    <div class="tab active">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="7" x2="21" y2="7"/>
        <circle cx="9" cy="7" r="2"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <circle cx="15" cy="12" r="2"/>
        <line x1="3" y1="17" x2="21" y2="17"/>
        <circle cx="7" cy="17" r="2"/>
      </svg>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </div>
  </div>

</div>
</body>
</html>
