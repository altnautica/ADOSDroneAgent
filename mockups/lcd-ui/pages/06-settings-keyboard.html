<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>06 — Settings keyboard</title>
<link rel="stylesheet" href="../styles.css">
</head>
<body>
<div class="screen">

  <div class="top-bar">
    <span class="hostname">groundnode</span>
    <span class="role">
      <span class="dot"></span>
      RECEIVER
    </span>
    <div class="sysmetrics">
      <span class="pair"><span class="label">CPU</span><span class="val">18%</span></span>
      <span class="pair"><span class="label">RAM</span><span class="val">1.2/4G</span></span>
      <span class="pair"><span class="label">T</span><span class="val">42°C</span></span>
    </div>
    <span class="clock">14:32:08</span>
  </div>

  <div class="content">
    <div class="keyboard">
      <div class="input-strip">
        <span class="lbl">WIFI PASSPHRASE</span>
        <div class="field">
          •••••••••<span class="caret"></span>
        </div>
      </div>

      <div class="keys">
        <div class="row">
          <div class="key">1</div>
          <div class="key">2</div>
          <div class="key">3</div>
          <div class="key">4</div>
          <div class="key">5</div>
          <div class="key">6</div>
          <div class="key">7</div>
          <div class="key">8</div>
          <div class="key">9</div>
          <div class="key">0</div>
          <div class="key">-</div>
          <div class="key action">⌫</div>
        </div>
        <div class="row">
          <div class="key">q</div>
          <div class="key">w</div>
          <div class="key">e</div>
          <div class="key">r</div>
          <div class="key">t</div>
          <div class="key">y</div>
          <div class="key">u</div>
          <div class="key">i</div>
          <div class="key">o</div>
          <div class="key">p</div>
          <div class="key">[</div>
          <div class="key">]</div>
        </div>
        <div class="row">
          <div class="key">a</div>
          <div class="key">s</div>
          <div class="key">d</div>
          <div class="key">f</div>
          <div class="key">g</div>
          <div class="key">h</div>
          <div class="key">j</div>
          <div class="key">k</div>
          <div class="key">l</div>
          <div class="key">;</div>
          <div class="key">'</div>
          <div class="key action">↵</div>
        </div>
        <div class="row">
          <div class="key action wide-2">⇧</div>
          <div class="key">z</div>
          <div class="key">x</div>
          <div class="key">c</div>
          <div class="key">v</div>
          <div class="key">b</div>
          <div class="key">n</div>
          <div class="key">m</div>
          <div class="key wide-3">space</div>
          <div class="key primary wide-2">SAVE</div>
        </div>
      </div>
    </div>
  </div>

  <div class="tab-bar">
    <div class="tab">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="6" width="14" height="12" rx="2"/><path d="M16 10l5-3v10l-5-3z"/>
      </svg>
    </div>
    <div class="tab active">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="7" x2="21" y2="7"/>
        <circle cx="9" cy="7" r="2"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <circle cx="15" cy="12" r="2"/>
        <line x1="3" y1="17" x2="21" y2="17"/>
        <circle cx="7" cy="17" r="2"/>
      </svg>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </div>
  </div>

</div>
</body>
</html>
