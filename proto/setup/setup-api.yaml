openapi: 3.0.3
info:
  title: ADOS Setup Webapp REST API
  description: |
    REST surface served by the agent at /api/v1/setup/* and consumed by
    the universal setup webapp at web/setup/. Source of truth:
    src/ados/api/routes/setup.py in the Python full agent. Backends in
    this repository serve the same routes with the same response
    shapes.

    Authentication: setup mutations follow same-origin trust by default
    and require an X-ADOS-Setup-Token header when
    config.security.setup_token_required is true. Cross-origin callers
    (cloud relay, third-party integrations) require X-ADOS-Key.
  version: "1.0.0"
  license:
    name: GPL-3.0-or-later

servers:
  - url: "http://localhost:8080/api/v1/setup"
    description: Direct LAN access (default port)
  - url: "{agent_host}/api/v1/setup"
    description: Operator-resolved agent host
    variables:
      agent_host:
        default: "http://ados.local:8080"

components:
  securitySchemes:
    AdosSetupToken:
      type: apiKey
      in: header
      name: X-ADOS-Setup-Token
      description: Optional setup-mutation token; required only when config.security.setup_token_required is true. Cross-origin callers always require X-ADOS-Key instead.

  schemas:
    SetupStatus:
      type: object
      description: |
        Universal setup state. See SetupStatus in src/ados/setup/models.py
        for the canonical Pydantic shape. Includes profile, hardware
        check status, services, access URLs, MAVLink and video state,
        and the remote-access (Cloudflare Tunnel) block.
      additionalProperties: true

    SetupActionResult:
      type: object
      properties:
        ok: { type: boolean }
        message: { type: string, nullable: true }
        status: { $ref: "#/components/schemas/SetupStatus" }

    HardwareCheckStatus:
      type: object
      additionalProperties: true
      description: |
        Per-component readiness for the selected profile. Populated by
        the hardware check engine reading /proc and lsusb against the
        board YAML's documented requirements. Lite backends additively
        attach a `wfb_driver` field carrying the pre-flight WFB-ng
        driver-stack readout (see `WfbDriverCheck`); clients that only
        consume the canonical `items` array continue to work unchanged.
      properties:
        wfb_driver:
          $ref: "#/components/schemas/WfbDriverCheck"

    WfbDriverCheck:
      type: object
      description: |
        Pre-flight readout for the WFB-ng broadcast driver stack.
        Surfaced in the hardware-check response so the wizard can warn
        the operator before they reach the radio configuration step.
        Lite-specific extension; the Python full agent does not yet
        emit this field.
      required:
        - rtl8812eu_loaded
        - wfb_tx_available
        - udev_rule_present
        - status
        - message
      properties:
        rtl8812eu_loaded:
          type: boolean
          description: |
            True when /proc/modules contains a line whose driver token
            starts with `8812` or `88xxau` (case-insensitive). Matches
            the upstream out-of-tree DKMS variants.
        wfb_tx_available:
          type: boolean
          description: |
            True when the userland `wfb_tx` binary resolves on a
            trusted absolute path. The probe never inherits `$PATH`.
        udev_rule_present:
          type: boolean
          description: |
            Best-effort: true when a file under /etc/udev/rules.d/
            references the Realtek vendor id `0bda`. False on
            Buildroot rootfs that bake the rule into initramfs and
            never write to /etc/udev/rules.d/. Informational only;
            does not feed into the rollup `status`.
        status:
          type: string
          enum: [ok, warning, error]
          description: |
            Aggregate severity. `ok` when both the driver and the
            binary are present; `warning` when exactly one is missing;
            `error` when both are missing (the agent has no radio
            capability on this host).
        message:
          type: string
          description: Human-readable summary of the observed signal pair.

    ProfileChoiceRequest:
      type: object
      required: [profile]
      properties:
        profile:
          type: string
          enum: [drone, ground_station]
        ground_role:
          type: string
          enum: [direct, relay, receiver]
          description: Required when profile is "ground_station".

    CloudChoiceRequest:
      type: object
      required: [mode]
      properties:
        mode:
          type: string
          enum: [cloud, self_hosted, local]
        self_hosted:
          type: object
          nullable: true
          properties:
            url: { type: string }
            mqtt_broker: { type: string, default: "" }
            mqtt_port: { type: integer, default: 8883 }
            api_key: { type: string, default: "", writeOnly: true }

    CloudflareTunnelRequest:
      type: object
      required: [token_or_script]
      properties:
        token_or_script:
          type: string
          writeOnly: true
          description: |
            Raw Cloudflare Tunnel token, or the full install command
            string Cloudflare shows in its dashboard. The agent extracts
            the token, persists it root-owned 0600 to
            /etc/ados/secrets/cloudflare-tunnel-token, and never echoes
            it back in any response or log.

    CloudflareVerifyResponse:
      type: object
      properties:
        reachable: { type: boolean }
        status_code: { type: integer, nullable: true }
        latency_ms: { type: integer, nullable: true }
        target_url: { type: string }
        error: { type: string, nullable: true }

    HealthResponse:
      type: object
      description: |
        Liveness probe body for /api/v1/health. Lite-specific: the Python
        full agent ships a different /healthz shape and is not bound by
        this schema.
      required: [status, version]
      properties:
        status:
          type: string
          enum: [ok, degraded]
          description: |
            `ok` when the HTTP server is responsive. `degraded` is
            reserved for a future phase that wires FC-connectivity
            tracking; v0.1 of the lite agent always reports `ok` because
            it has no live FC heartbeat probe.
        version:
          type: string
          description: Agent semver, sourced from the binary's CARGO_PKG_VERSION at build time.

    DiagMqttSection:
      type: object
      description: MQTT relay slice of the diag snapshot.
      required: [broker, connected_recently]
      properties:
        broker:
          type: string
          description: Configured MQTT broker host (no scheme). Empty string when the agent has not yet been pointed at a broker.
        connected_recently:
          type: boolean
          description: |
            True when a successful publish landed within the last
            30 s. Derived from a wall-clock timestamp the publish loop
            updates on each successful publish.

    DiagCloudRelaySection:
      type: object
      description: Convex cloud-relay slice of the diag snapshot.
      required: [convex_url, consecutive_failures]
      properties:
        convex_url:
          type: string
          description: Configured Convex URL. Empty string when the agent has not yet been pointed at a relay.
        last_heartbeat_at:
          type: integer
          format: int64
          nullable: true
          description: |
            UNIX seconds of the last heartbeat that returned 2xx.
            `null` when no heartbeat has ever succeeded since the
            agent started.
        consecutive_failures:
          type: integer
          minimum: 0
          description: |
            Heartbeat failures since the last success. Saturates at
            `u32::MAX` so a long outage cannot wrap.

    DiagMavlinkSection:
      type: object
      description: MAVLink router slice of the diag snapshot.
      required: [port]
      properties:
        port:
          type: string
          description: Configured FC serial port (e.g. `/dev/serial0`). Empty string when no port is configured.
        frame_rate_recent:
          type: number
          format: float
          nullable: true
          description: |
            Recent FC frame rate in Hz. `null` at v0.1 — the lite agent
            does not yet wire a frame-rate estimator. Populated by a
            later phase.

    WfbConfigSummary:
      type: object
      description: |
        Public surface of the WFB-ng air-side configuration. The
        operator passphrase is deliberately omitted — only the derived
        key bytes ever leave the agent process, and they only travel
        as command-line arguments to the local `wfb_tx` child.
      required:
        - channel
        - mcs_index
        - tx_power_dbm
        - binary_present
      properties:
        channel:
          type: integer
          minimum: 1
          maximum: 165
          description: 802.11 channel. 1-13 (2.4 GHz) or 36-165 (5 GHz).
        mcs_index:
          type: integer
          minimum: 0
          maximum: 7
          description: 802.11 MCS index. Single-stream RTL8812 path runs 0..=7.
        tx_power_dbm:
          type: integer
          minimum: -1
          maximum: 30
          description: |
            Transmit power in dBm. Negative values mean "leave the
            adapter at its default" rather than "off."
        interface:
          type: string
          nullable: true
          description: |
            Bound `wlanX` interface name. `null` until a dongle is
            detected by the udev watcher.
        binary_present:
          type: boolean
          description: |
            True when the configured `wfb_tx` binary path resolves on
            disk. The wizard surfaces this in the hardware-check step.

    WfbStateResponse:
      type: object
      description: |
        Combined state-machine + config snapshot returned by
        GET /api/v1/setup/wfb. Lite-specific operability extension.
      required: [state, config_summary]
      properties:
        state:
          type: object
          description: |
            Tagged union over the WFB manager state. The `state` field
            (string) discriminates `idle`, `dongle_detected`, `running`,
            and `crashed` cases. Each case carries its own additional
            properties (`iface` for `dongle_detected` / `running`,
            `last_error` + `restart_at_unix` for `crashed`).
          additionalProperties: true
        config_summary:
          $ref: "#/components/schemas/WfbConfigSummary"

    WfbConfigureRequest:
      type: object
      description: |
        Channel / MCS / passphrase / power update request for the
        WFB-ng broadcast pipeline. The passphrase is `writeOnly` so
        operators cannot read it back from the GET surface.
      required: [channel, mcs_index, tx_power_dbm]
      properties:
        channel:
          type: integer
          minimum: 1
          maximum: 165
        mcs_index:
          type: integer
          minimum: 0
          maximum: 7
        tx_power_dbm:
          type: integer
          minimum: -1
          maximum: 30
        key_passphrase:
          type: string
          writeOnly: true
          description: |
            Optional. Omit to keep the existing keypair; provide a
            non-empty string to derive a new keypair. When supplied,
            the agent runs the documented KDF (SHA-256 → Curve25519
            → SHA-256) to mint the 32-byte broadcast key, never
            persisting the passphrase in clear.

    WfbConfigureResponse:
      type: object
      required: [ok, state]
      properties:
        ok: { type: boolean }
        message: { type: string, nullable: true }
        state: { $ref: "#/components/schemas/WfbStateResponse" }

    WfbRegenerateKeyResponse:
      type: object
      description: |
        Result of POST /api/v1/setup/wfb/regenerate-key. Returns the
        public component of a freshly minted Curve25519 keypair so the
        operator can record it for ground-side decoding. The secret
        scalar stays on disk in a root-owned 0600 file and is not
        returned in any response.
      required: [ok, public_key_hex]
      properties:
        ok: { type: boolean }
        public_key_hex:
          type: string
          description: 32-byte Curve25519 public key, hex-encoded.

    DiagResponse:
      type: object
      description: |
        Diagnostic snapshot body for /api/v1/diag. Lite-specific. Field
        names are snake_case to match the diag handler's JSON output.
        Pair codes, API keys, and Cloudflare Tunnel tokens are NEVER
        included in this surface.
      required:
        - version
        - uptime_seconds
        - device_id
        - paired
        - runtime_mode
        - mqtt
        - cloud_relay
        - mavlink
      properties:
        version:
          type: string
          description: Agent semver from CARGO_PKG_VERSION.
        uptime_seconds:
          type: integer
          format: int64
          minimum: 0
          description: Seconds since the agent process booted.
        device_id:
          type: string
          description: Stable device identifier read from agent.yaml. Empty string when agent.yaml is missing or malformed.
        paired:
          type: boolean
          description: True when pairing.json contains a valid api_key.
        runtime_mode:
          type: string
          enum: [lite, full]
          description: Which agent flavor is reporting. Always `lite` for backends that serve this exact response shape.
        rss_mb:
          type: integer
          format: int64
          nullable: true
          minimum: 0
          description: |
            Process resident-set size in megabytes, read live from
            `/proc/self/status`. `null` on non-Linux hosts (dev mac
            builds) where /proc is unavailable.
        mqtt:
          $ref: "#/components/schemas/DiagMqttSection"
        cloud_relay:
          $ref: "#/components/schemas/DiagCloudRelaySection"
        mavlink:
          $ref: "#/components/schemas/DiagMavlinkSection"

paths:
  /status:
    get:
      summary: Read the universal setup state
      responses:
        "200":
          description: Current setup status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SetupStatus" }

  /profile:
    post:
      summary: Configure drone or ground-station profile
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProfileChoiceRequest" }
      responses:
        "200":
          description: Profile saved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SetupActionResult" }

  /hardware-check:
    get:
      summary: Read per-component hardware readiness
      responses:
        "200":
          description: Hardware check snapshot
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HardwareCheckStatus" }

  /hardware-check/refresh:
    post:
      summary: Re-run the hardware check
      description: |
        Useful after hot-plugging USB peripherals or swapping a camera.
        The agent re-probes /proc, lsusb, and the device tree, then
        returns the updated snapshot.
      responses:
        "200":
          description: Hardware check snapshot after refresh
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HardwareCheckStatus" }

  /cloud-choice:
    post:
      summary: Set cloud posture (cloud, self-hosted, or local)
      description: |
        Configures the cloud relay endpoint or self-hosted broker. The
        api_key field, when supplied, is written to a root-owned secret
        file and never echoed back.
      security:
        - AdosSetupToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CloudChoiceRequest" }
      responses:
        "200":
          description: Cloud choice saved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SetupActionResult" }

  /remote-access/cloudflare:
    post:
      summary: Install a Cloudflare Tunnel token and start cloudflared
      security:
        - AdosSetupToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CloudflareTunnelRequest" }
      responses:
        "200":
          description: Token persisted; cloudflared service starting
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SetupActionResult" }

  /cloudflare/verify:
    get:
      summary: Verify Cloudflare Tunnel reachability
      description: |
        The agent makes an outbound HTTPS GET to its public setup URL
        and reports the result. Timeout is 5 s.
      responses:
        "200":
          description: Tunnel verification result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CloudflareVerifyResponse" }

  /cloudflare/logs:
    get:
      summary: Stream cloudflared journal lines via WebSocket
      description: |
        Upgrades to a WebSocket. Each frame is a single journal line
        from the cloudflared systemd unit. Token-shaped values are
        redacted before emission. No authentication required for the
        WebSocket upgrade itself; the upgrade respects same-origin
        trust on the underlying request.
      responses:
        "101":
          description: WebSocket upgrade

  /finish:
    post:
      summary: Mark onboarding complete
      description: |
        Sets setup_finalized=true in the persistent state and
        transitions the wizard out of first-boot mode.
      security:
        - AdosSetupToken: []
      responses:
        "200":
          description: Setup finalized
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SetupStatus" }

  /step/{step_id}/skip:
    post:
      summary: Defer a setup step
      parameters:
        - in: path
          name: step_id
          required: true
          schema:
            type: string
            enum: [welcome, profile, hardware_check, cloud_choice, pair, mavlink, video, ground_receiver, remote_access, finish]
      security:
        - AdosSetupToken: []
      responses:
        "200":
          description: Step skipped; updated status returned
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SetupStatus" }
        "400":
          description: Step is required (welcome, finish) and cannot be skipped
        "404":
          description: Unknown step_id

  /reset:
    post:
      summary: Clear setup_finalized and the skipped-steps set
      security:
        - AdosSetupToken: []
      responses:
        "200":
          description: Setup state reset; wizard returns to first-boot mode
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SetupStatus" }

  # ---------------------------------------------------------------------------
  # Operability surface (lite-specific extension).
  #
  # The two routes below sit OUTSIDE the /api/v1/setup/* tree because they
  # are agent-wide diagnostics rather than wizard mutations. They are a
  # lite-specific extension: the Python full agent ships a separate
  # /healthz surface and does not expose this exact shape. Backends are
  # not required to implement these routes; if implemented, the response
  # bodies must match the schemas below so a single Mission Control
  # client can read either backend without branching.
  # ---------------------------------------------------------------------------

  /api/v1/health:
    get:
      summary: Liveness probe (lite-specific)
      description: |
        Returns 200 with `{"status": "ok", "version": ...}` when the HTTP
        server is responsive. No authentication required: the route is
        deliberately outside the same-origin gate so an external
        monitoring agent on a neighbouring host can hit it without
        forging an Origin header. The route exposes no operator-controlled
        mutation surface, so the open posture is safe.

        Lite-specific. Backends are not required to implement; if
        implemented, the response shape must match this schema. The
        Python full agent ships /healthz separately with its own shape,
        which is not a contract requirement for `lite`.
      responses:
        "200":
          description: Agent is responsive
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthResponse" }

  /api/v1/setup/wfb:
    get:
      summary: Read WFB-ng broadcast configuration and dongle state (lite-specific)
      description: |
        Lite-specific operability extension. Returns the current
        WFB-ng channel / MCS / tx-power configuration plus the manager
        state machine (idle / dongle-detected / running / crashed) so
        the wizard can render an "is it broadcasting?" banner without
        polling lower-level system tools.

        Backends are not required to implement; if implemented, the
        response shape must match `WfbStateResponse`. The Python full
        agent ships its WFB-ng surface under a different route shape
        and is not bound by this schema.
      responses:
        "200":
          description: Current WFB state + config summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WfbStateResponse" }

  /api/v1/setup/wfb/configure:
    post:
      summary: Update WFB-ng channel, MCS, transmit power, and passphrase (lite-specific)
      description: |
        Lite-specific operability extension. Validates the supplied
        channel / MCS / power against the safety envelope (1-13 or
        36-165 for channel, 0-7 for MCS, -1..=30 dBm for power) and,
        on success, runs the documented KDF over the passphrase to
        mint a fresh 32-byte broadcast key. The agent restarts
        `wfb_tx` with the new arguments on the next event tick.
      security:
        - AdosSetupToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WfbConfigureRequest" }
      responses:
        "200":
          description: Configuration accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WfbConfigureResponse" }
        "400":
          description: Validation failure (channel / MCS / power out of range, empty passphrase)

  /api/v1/setup/wfb/regenerate-key:
    post:
      summary: Mint a fresh Curve25519 keypair for the broadcast pipeline (lite-specific)
      description: |
        Lite-specific operability extension. Generates a new
        Curve25519 keypair, persists the secret scalar root-owned 0600,
        and returns only the public component. The operator records
        the public key for ground-side decoder seeding.
      security:
        - AdosSetupToken: []
      responses:
        "200":
          description: New keypair minted; public key returned
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WfbRegenerateKeyResponse" }

  /api/v1/diag:
    get:
      summary: Diagnostic dump for operator debugging (lite-specific)
      description: |
        Wider than `/health`: surfaces uptime, runtime mode, identity, and
        best-effort live counters for the cloud relay and MAVLink router.
        Fields the agent does not yet track (`mavlink.frame_rate_recent`)
        appear as `null` so future phases can populate them without
        breaking consumers.

        Sits behind the same-origin gate (loopback or matching Host).
        Pair codes, API keys, and Cloudflare Tunnel tokens are
        deliberately omitted from this surface — operators get enough
        detail to debug connectivity without the response carrying
        bearer credentials into a journalctl scrape.

        Lite-specific. Backends are not required to implement; if
        implemented, the response shape must match this schema.
      responses:
        "200":
          description: Diagnostic snapshot
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DiagResponse" }
