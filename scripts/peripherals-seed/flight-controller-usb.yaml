id: ados.flight-controller-usb
display_name: "Flight controller (MAVLink over USB)"
transport: serial
match:
  regex: "/dev/serial/by-id/usb-(ArduPilot|Holybro|SpeedyBee|Pixhawk|iNav).*"
capabilities:
  - mavlink
  - fc
extra:
  description: "Auto-detected MAVLink flight controller. ArduPilot, iNav, Betaflight, PX4."
  category: fc
