schema_version: 1
id: ados.flight-controller-usb
name: "Flight controller (MAVLink over USB)"
description: "Auto-detected MAVLink flight controller on /dev/serial/by-id/*. ArduPilot, iNav, Betaflight, PX4."
category: "fc"
bus: "usb"
match:
  - device_path: "/dev/serial/by-id/usb-*ArduPilot*"
  - device_path: "/dev/serial/by-id/usb-*Holybro*"
  - device_path: "/dev/serial/by-id/usb-*SpeedyBee*"
  - device_path: "/dev/serial/by-id/usb-*Pixhawk*"
  - device_path: "/dev/serial/by-id/usb-*iNav*"
state:
  source: "agent.fc_connection"
actions: []
