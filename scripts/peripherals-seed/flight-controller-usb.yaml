id: ados.flight-controller-usb
display_name: "Flight controller (MAVLink over USB)"
transport: serial
match:
  regex: "^/dev/serial/by-id/usb-(ArduPilot|Holybro|Pixhawk|PX4).*$"
capabilities:
  - mavlink
  - fc
extra:
  description: "Auto-detected MAVLink flight controller. ArduPilot, PX4, Holybro, Pixhawk."
  category: fc
