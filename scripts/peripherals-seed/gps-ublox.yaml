schema_version: 1
id: ados.gps-ublox
name: "u-blox GPS receiver"
description: "u-blox 8/9/10 series GNSS via UART or USB. Surfaces fix type and satellite count from MAVLink GPS_RAW_INT."
category: "gps"
bus: "uart"
match:
  - device_path: "/dev/serial/by-id/usb-u-blox*"
  - device_path: "/dev/serial/by-id/usb-1546_*"
state:
  source: "agent.vehicle_state.gps"
actions: []
