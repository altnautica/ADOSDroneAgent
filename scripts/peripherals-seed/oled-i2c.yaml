id: ados.oled-i2c
display_name: "OLED status display (I2C)"
transport: serial
match:
  regex: "^/dev/i2c-(0|1)$"
capabilities:
  - display
  - ssd1306
extra:
  description: "0.96\" / 1.3\" SSD1306 OLED bound to the agent's status renderer."
  category: display
  i2c_addr_candidates:
    - "0x3c"
    - "0x3d"
