agent:
  device_id: ""
  name: "my-drone"
  tier: "auto"

mavlink:
  serial_port: ""
  baud_rate: 57600
  system_id: 1
  component_id: 191
  endpoints:
    - type: websocket
      port: 8765
      enabled: true

video:
  mode: "auto"
  cloud_relay_url: ""

network:
  hotspot:
    # Off by default; operators opt in via the Setup webapp's
    # Network step (or by setting this field to true in
    # /etc/ados/config.yaml). The Pydantic schema default in
    # src/ados/core/config/network.py also reads false; keep both
    # in sync.
    enabled: false
    password: "altnautica"

server:
  mode: "cloud"
  telemetry_rate: 2
  heartbeat_interval: 5
  mqtt_transport: "websockets"
  mqtt_username: "ados"
  mqtt_password: ""

remote_access:
  provider: "none"
  public_urls: []
  cloudflare:
    enabled: false
    token_path: "/etc/ados/secrets/cloudflare-tunnel-token"
    service_name: "cloudflared"
    setup_url: ""
    api_url: ""
    video_whep_url: ""
    mavlink_ws_url: ""

security:
  tls:
    enabled: false
  api:
    cors_enabled: true
  setup_token_required: false

suites:
  manifest_dir: "/etc/ados/suites"
  active: ""

scripting:
  rest_api:
    enabled: true
    # IPv4 wildcard. The actual listener is dual-stack — a helper at
    # service startup binds both AF_INET (this address) and AF_INET6
    # (`::`) sockets so the agent answers on every interface family
    # regardless of how the browser resolved the mDNS hostname.
    host: "0.0.0.0"
    port: 8080

ota:
  channel: "stable"
  check_interval: 24
  auto_install: false
  github_repo: "altnautica/ADOSDroneAgent"

logging:
  level: "info"
  max_size_mb: 50
  keep_count: 5

pairing:
  state_path: "/etc/ados/pairing.json"
  convex_url: "https://convex-site.altnautica.com"
  beacon_interval: 30
  heartbeat_interval: 60
  code_ttl: 900

discovery:
  mdns_enabled: true
  service_type: "_ados._tcp.local."

swarm:
  enabled: false
