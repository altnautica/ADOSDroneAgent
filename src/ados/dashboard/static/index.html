<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0a0d12" />
    <title>ADOS</title>
    <link rel="icon" type="image/svg+xml" href="/brand.svg" />
    <style>
      :root { color-scheme: dark light; }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        background: hsl(220 18% 6%);
        color: hsl(220 12% 92%);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        font-size: 14px;
        line-height: 1.5;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        padding: 24px;
      }
      .card {
        max-width: 520px;
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .brand img { height: 32px; width: 32px; }
      .brand strong {
        font-size: 22px;
        letter-spacing: -0.01em;
      }
      h1 {
        font-size: 18px;
        font-weight: 500;
        margin: 0;
      }
      p { margin: 0; color: hsl(220 8% 60%); }
      code {
        font-family: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, monospace;
        font-size: 12px;
        padding: 1px 4px;
        background: hsl(220 14% 14%);
        border-radius: 3px;
      }
      dl {
        display: grid;
        grid-template-columns: 8em 1fr;
        gap: 6px 16px;
        font-size: 13px;
        margin: 0;
        padding-top: 16px;
        border-top: 1px solid hsl(220 14% 18%);
      }
      dt { color: hsl(220 8% 60%); }
      dd { margin: 0; font-family: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, monospace; }
      .status { color: hsl(220 8% 60%); font-size: 12px; font-family: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, monospace; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="brand">
        <img src="/brand.svg" alt="" aria-hidden="true" />
        <strong>ADOS</strong>
      </div>
      <div>
        <h1>Dashboard rebuild in progress</h1>
        <p>
          The browser dashboard is being rebuilt on a new stack.
          The agent itself is fully operational. Use the CLI on the
          device, or hit the REST API at <code>/api</code>, while the
          new dashboard ships.
        </p>
      </div>
      <dl id="status">
        <dt>connecting</dt>
        <dd class="status">to /api/status…</dd>
      </dl>
    </div>
    <script>
      fetch("/api/status")
        .then((r) => r.json())
        .then((data) => {
          const dl = document.getElementById("status");
          dl.innerHTML = "";
          const rows = [
            ["version", data.version],
            ["board", (data.board && data.board.name) || "unknown"],
            ["flight controller", data.fc_connected ? "connected" : "disconnected"],
          ];
          for (const [k, v] of rows) {
            const dt = document.createElement("dt");
            dt.textContent = k;
            const dd = document.createElement("dd");
            dd.textContent = v;
            dl.appendChild(dt);
            dl.appendChild(dd);
          }
        })
        .catch(() => {});
    </script>
  </body>
</html>
