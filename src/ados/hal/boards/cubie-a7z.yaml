# Radxa Cubie A7Z — Allwinner A733 (SoC family string sun55iw3p1 / sun60iw2)
#
# Pi-Zero-sized SBC, 1/2/4/8/16 GB SKUs. ram_mb below documents the
# smallest SKU; runtime detection via psutil reports the actual amount.
#
# 40-pin expansion header is Pi-pinout-compatible at the SPI/I2C signal
# level: SPI1 (PD10..PD13) lands on the same physical pins (24/23/19/21)
# that the Raspberry Pi places SPI0 on, so a Pi-style HAT plugs in
# without rewiring. One quirk: the AO/RTC pinctrl block (PL/PM banks)
# drives a few of the header pins, so device-tree overlays that touch
# them must reference both ``pio`` and ``r_pio``.
#
# Sources:
#   https://docs.radxa.com/en/cubie/a7z/hardware-use/pin-gpio
#   https://www.cnx-software.com/2025/08/25/pi-zero-sized-radxa-cubie-a7z-sbc-features-allwinner-a733-cortex-a76-a55-soc-up-to-16gb-ram-wifi-6/

name: "Radxa Cubie A7Z"
vendor: "Radxa"
soc: "Allwinner A733"
arch: "aarch64"
model_patterns:
  - "Radxa Cubie A7Z"
  - "Cubie A7Z"
  - "cubie-a7z"
  # The A733 SoC family string varies by BSP: the Debian 11 R6 image
  # reports sun60iw2 in the device-tree model, earlier docs cite
  # sun55iw3p1. List both so substring auto-detect matches either.
  - "sun55iw3p1"
  - "sun60iw2"
  - "Allwinner A733"
default_tier: 2

gpio_pins:
  - 3   # I2C SDA
  - 5   # I2C SCL
  - 7   # PB0 / SPI2 / UART0
  - 8   # PB9 / UART
  - 10  # PB10 / UART
  - 11  # PB1 (touch IRQ for the Waveshare 3.5" RPi LCD HAT)
  - 12  # PB5 / I2S / SPI2 alt
  - 18  # PJ25 (LCD DC)
  - 19  # PD12 / SPI1 MOSI
  - 21  # PD13 / SPI1 MISO
  - 22  # PL5 (LCD RST — on the AO/RTC pinctrl block)
  - 23  # PD11 / SPI1 CLK
  - 24  # PD10 / SPI1 CS0
  - 26  # PD14 (driven as cs_touch GPIO chip-select)
uart_paths:
  - /dev/ttyS0
  - /dev/ttyS3
hw_video_codecs:
  - h264_enc
  - h264_dec
  - h265_dec

board:
  id: cubie-a7z
  manufacturer: Radxa
  status: experimental

compute:
  cores: 8
  core_type: "Cortex-A76 x2 + Cortex-A55 x6"
  max_freq_mhz: 2200
  gpu: "Imagination BXM-4-64 MC1"
  npu_tops: 3.0
  hw_encoder: ["h264"]
  hw_decoder: ["h264", "h265"]
  ram_mb: 1024
  ram_type: LPDDR4X

storage:
  emmc: true
  emmc_gb: 0
  sd_card: true
  nand: false

buses:
  uart:
    - id: uart0
      path: /dev/ttyS0
      baud: 115200
      fc_capable: false
    - id: uart3
      path: /dev/ttyS3
      baud: 921600
      fc_capable: true
  usb:
    - id: usb0
      path: "/dev/bus/usb/001/*"
      type: usb2
  i2c:
    - id: i2c11
      path: /dev/i2c-11
      speed_hz: 400000
  spi:
    - id: spi1
      path: /dev/spidev1.0
      notes: "PD10..PD13 — physical pins 24/23/19/21, Pi-pinout signal positions"

network:
  wifi: true
  ethernet: false
  bluetooth: true

video:
  csi_ports: 1
  csi_connector: "31-pin 0.3mm Radxa FPC, 4-lane"
  max_encode_resolution: "1920x1080"
  max_encode_fps: 60
  encoder_api: vendor
  # Single CSI consumed by the primary camera. Single USB host can carry
  # a UVC nav camera if the WFB-ng dongle is on the OTG port.
  nav_cameras:
    csi_count: 1
    usb_uvc_count: 1
    recommended_role: nav-usb

# Cameras this board can drive. Generalises the displays: pattern — the
# universal provisioner enables overlay_required cameras at install time and
# the camera service binds them at runtime. Boards with no camera omit this.
# overlay_ref is a glob token matched under /boot/dtbo (the BSP basename
# carries a board-family prefix), never a hardcoded full filename.
cameras:
  supported:
    - id: csi-imx214
      type: csi
      sensor: "Sony IMX214"
      bus: csi
      orientation: forward
      overlay_required: true
      # bsp-disabled: the BSP ships the dtbo as *.dtbo.disabled; enable in place.
      overlay_source: bsp-disabled
      overlay_ref: "radxa-camera-13m-214"
      # vendor_isp: use the vendor ISP v4l2 source, not plain UVC.
      vendor_isp: true
      isp_flags: ["en-awisp=1", "en-largemode=0"]
      modules_required: [sunxi-vin]
      modes:
        - {node: /dev/video0, width: 1920, height: 1080, fps: 30, format: NV12, isp_flags: ["en-awisp=1", "en-largemode=0"]}
        - {node: /dev/video1, width: 4208, height: 3120, fps: 24, format: NV12, isp_flags: ["en-awisp=1", "en-largemode=1"]}
      default_mode: "1920x1080@30"
    - id: usb-nav
      type: usb
      bus: usb
      orientation: downward
      overlay_required: false
      vendor_isp: false

# Radios this board carries. Drives install-time driver provisioning via the
# universal provisioner. The onboard management Wi-Fi is intentionally NOT
# listed — it is excluded from injection use by the adapter selector.
radios:
  supported:
    - id: wfb-rtl8812eu
      role: wfb-injection
      chipset: RTL8812EU
      driver: rtl8812eu
      install: dkms
      modules_required: [8812eu]
      mesh_capable: true

# Flight-controller link hints, priority-ordered. The provisioner seeds
# serial_port/baud_rate from the first matching interface; the runtime router
# still probes and falls back. uart3 owns /dev/ttyS3 here (see buses), so the
# rangefinder uses the I2C port, not the UART.
flight_controller:
  interfaces:
    - id: fc-uart3
      type: uart
      path: /dev/ttyS3
      baud: 921600
      priority: 1
    - id: fc-usb
      type: usb-acm
      baud_candidates: [921600, 115200, 57600]
      priority: 2

# Universal provisioning manifest walked by the install-time provisioner:
# ensure packages, enable declared overlays, install declared drivers.
provisioning:
  packages:
    - {id: camera-userspace, when: camera, apt: [gstreamer1.0-tools, v4l-utils]}
  overlays:
    - {camera: csi-imx214, when: camera_overlay_required}
  drivers:
    - {radio: wfb-rtl8812eu}

power:
  typical_watts: 2.0
  max_watts: 5.0
  voltage: 5.0
  input: "USB-C 5V/2A"

# Cortex-A76 pair + 3 TOPS NPU can host VIO on the 4 GB+ SKUs. The 1 GB
# SKU is too tight; the runtime should gate the VIO front-end on real
# RAM. The flight controller owns /dev/ttyS3 (see flight_controller), so
# the rangefinder lands on the broken-out I2C bus.
navigation:
  vio_capable: true
  rangefinder_ports:
    - {type: i2c, path: /dev/i2c-11, speed_hz: 400000}

displays:
  supported:
    - id: waveshare35a
      type: spi-lcd
      controller: ILI9486
      touch_chip: ADS7846
      bus: spi1
      resolution: 480x320
      overlay_source: repo
      overlay_ref: cubie-a7z-waveshare35a.dts
      gpio:
        dc:
          pin: PJ25
          pinctrl: default
          header_pin: 18
          direction: out
        reset:
          pin: PL5
          pinctrl: r_pio
          header_pin: 22
          direction: out
        irq:
          pin: PB1
          pinctrl: default
          header_pin: 11
          direction: in
        cs_touch:
          pin: PD14
          pinctrl: default
          header_pin: 26
          direction: out
      default_rotation: 90
      modules_required:
        - fbtft
        - fb_ili9486
        - ads7846

profiles:
  ground_station:
    tier: "lite"
    video_capable: false
    usb_gadget: false
    hdmi: false
    role: receiver
    supports_roles:
      - direct
      - relay
      - receiver
    mesh_capable: true
    physical_ui: framebuffer
    max_features:
      - wfb_rx
      - mesh_relay
      - mesh_receiver
      - batman_adv
      - framebuffer_lcd
