# Radxa Cubie A7Z — Allwinner A733 (sun55iw3p1)
#
# Pi-Zero-sized SBC, 1/2/4/8/16 GB SKUs. ram_mb below documents the
# smallest SKU; runtime detection via psutil reports the actual amount.
#
# 40-pin expansion header is Pi-pinout-compatible at the SPI/I2C signal
# level: SPI1 (PD10..PD13) lands on the same physical pins (24/23/19/21)
# that the Raspberry Pi places SPI0 on, so a Pi-style HAT plugs in
# without rewiring. One quirk: the AO/RTC pinctrl block (PL/PM banks)
# drives a few of the header pins, so device-tree overlays that touch
# them must reference both ``pio`` and ``r_pio``.
#
# Sources:
#   https://docs.radxa.com/en/cubie/a7z/hardware-use/pin-gpio
#   https://www.cnx-software.com/2025/08/25/pi-zero-sized-radxa-cubie-a7z-sbc-features-allwinner-a733-cortex-a76-a55-soc-up-to-16gb-ram-wifi-6/

name: "Radxa Cubie A7Z"
vendor: "Radxa"
soc: "Allwinner A733"
arch: "aarch64"
model_patterns:
  - "Radxa Cubie A7Z"
  - "Cubie A7Z"
  - "cubie-a7z"
  - "sun55iw3p1"
  - "Allwinner A733"
default_tier: 2

gpio_pins:
  - 3   # I2C SDA
  - 5   # I2C SCL
  - 7   # PB0 / SPI2 / UART0
  - 8   # PB9 / UART
  - 10  # PB10 / UART
  - 11  # PB1 (touch IRQ for the Waveshare 3.5" RPi LCD HAT)
  - 12  # PB5 / I2S / SPI2 alt
  - 18  # PJ25 (LCD DC)
  - 19  # PD12 / SPI1 MOSI
  - 21  # PD13 / SPI1 MISO
  - 22  # PL5 (LCD RST — on the AO/RTC pinctrl block)
  - 23  # PD11 / SPI1 CLK
  - 24  # PD10 / SPI1 CS0
  - 26  # PD14 (driven as cs_touch GPIO chip-select)
uart_paths:
  - /dev/ttyS0
  - /dev/ttyS3
hw_video_codecs:
  - h264_enc
  - h264_dec
  - h265_dec

board:
  id: cubie-a7z
  manufacturer: Radxa
  status: experimental

compute:
  cores: 8
  core_type: "Cortex-A76 x4 + Cortex-A55 x4"
  max_freq_mhz: 2200
  gpu: "Mali-G57 MC1"
  npu_tops: 2.0
  hw_encoder: ["h264"]
  hw_decoder: ["h264", "h265"]
  ram_mb: 1024
  ram_type: LPDDR4X

storage:
  emmc: true
  emmc_gb: 0
  sd_card: true
  nand: false

buses:
  uart:
    - id: uart0
      path: /dev/ttyS0
      baud: 115200
      fc_capable: false
    - id: uart3
      path: /dev/ttyS3
      baud: 921600
      fc_capable: true
  usb:
    - id: usb0
      path: "/dev/bus/usb/001/*"
      type: usb2
  i2c:
    - id: i2c11
      path: /dev/i2c-11
      speed_hz: 400000
  spi:
    - id: spi1
      path: /dev/spidev1.0
      notes: "PD10..PD13 — physical pins 24/23/19/21, Pi-pinout signal positions"

network:
  wifi: true
  ethernet: false
  bluetooth: true

video:
  csi_ports: 1
  csi_connector: "31-pin 0.3mm Radxa FPC, 4-lane"
  max_encode_resolution: "1920x1080"
  max_encode_fps: 60
  encoder_api: vendor
  # Single CSI consumed by the primary camera. Single USB host can carry
  # a UVC nav camera if the WFB-ng dongle is on the OTG port.
  nav_cameras:
    csi_count: 1
    usb_uvc_count: 1
    recommended_role: nav-usb

power:
  typical_watts: 2.0
  max_watts: 5.0
  voltage: 5.0
  input: "USB-C 5V/2A"

ros:
  supported: false

# Cortex-A76 pair + 2 TOPS NPU can host VIO on the 4 GB+ SKUs. The 1 GB
# SKU is too tight; the runtime should gate the VIO front-end on real
# RAM. Rangefinder lands on the FC UART link (shared with the FC) or
# the broken-out I2C bus.
navigation:
  vio_capable: true
  rangefinder_ports:
    - {type: uart, path: /dev/ttyS3, baud_max: 115200}
    - {type: i2c, path: /dev/i2c-11, speed_hz: 400000}

displays:
  supported:
    - id: waveshare35a
      type: spi-lcd
      controller: ILI9486
      touch_chip: ADS7846
      bus: spi1
      resolution: 480x320
      overlay_source: repo
      overlay_ref: cubie-a7z-waveshare35a.dts
      gpio:
        dc:
          pin: PJ25
          pinctrl: default
          header_pin: 18
          direction: out
        reset:
          pin: PL5
          pinctrl: r_pio
          header_pin: 22
          direction: out
        irq:
          pin: PB1
          pinctrl: default
          header_pin: 11
          direction: in
        cs_touch:
          pin: PD14
          pinctrl: default
          header_pin: 26
          direction: out
      default_rotation: 90
      modules_required:
        - fbtft
        - fb_ili9486
        - ads7846

profiles:
  ground_station:
    tier: "lite"
    video_capable: false
    usb_gadget: false
    hdmi: false
    role: receiver
    supports_roles:
      - direct
      - relay
      - receiver
    mesh_capable: true
    physical_ui: framebuffer
    max_features:
      - wfb_rx
      - mesh_relay
      - mesh_receiver
      - batman_adv
      - framebuffer_lcd
