name: "Orange Pi 5"
vendor: "Xunlong"
soc: "RK3588S"
arch: "aarch64"
model_patterns:
  - "Orange Pi 5"
  - "Orangepi 5"
default_tier: 4
gpio_pins:
  - 3   # SDA
  - 5   # SCL
  - 8   # UART TX
  - 10  # UART RX
  - 12  # PWM
uart_paths:
  - /dev/ttyS0
  - /dev/ttyS1
hw_video_codecs:
  - h264_enc
  - h264_dec
  - h265_enc
  - h265_dec
  - av1_dec
  - vp9_dec

# ROS 2: RK3588S with 4-16 GB variants. Docker fits. Minimal profile conservative
# default for 4 GB; 8+ GB boards could run VIO but RAM is not guaranteed at HAL level.
ros:
  supported: true
  max_profile: minimal
