name: "Raspberry Pi 4B"
vendor: "Raspberry Pi"
soc: "BCM2711"
arch: "aarch64"
model_patterns:
  - "Raspberry Pi 4 Model B"
  - "Raspberry Pi 4B"
default_tier: 3
gpio_pins:
  - 2   # SDA1
  - 3   # SCL1
  - 14  # UART TX
  - 15  # UART RX
  - 18  # PWM0
uart_paths:
  - /dev/ttyAMA0
  - /dev/ttyS0
hw_video_codecs:
  - h264_enc
  - h264_dec
  - h265_dec

# Pi 4B exposes one MIPI CSI on the standard board and four USB host
# ports. Downward navigation camera typically lands on a USB UVC port
# because the single CSI is consumed by the primary forward camera.
video:
  csi_ports: 1
  max_encode_resolution: "1920x1080"
  max_encode_fps: 30
  encoder_api: v4l2
  nav_cameras:
    csi_count: 1
    usb_uvc_count: 4
    recommended_role: nav-usb

# 4-8 GB SKUs and Cortex-A72 quad can carry a CPU-bound VIO at modest
# frame rates. No dedicated NPU, so optical flow is the more efficient
# default. Rangefinder lands on the primary UART or the I2C bus.
navigation:
  vio_capable: false
  rangefinder_ports:
    - {type: uart, path: /dev/ttyAMA0, baud_max: 115200}
    - {type: i2c, path: /dev/i2c-1, speed_hz: 400000}

# ground-station bench build uses OLED on I2C1 and four menu buttons.
buses:
  i2c:
    - id: i2c1
      path: /dev/i2c-1
      notes: "OLED on pins 3/5 (SDA/SCL)"

# Ground-station menu buttons (BCM GPIO numbering).
# header_pin is the physical pin on the 40-pin header.
gpio_buttons:
  - id: btn_b1
    pin: 5
    header_pin: 29
    function: "ground-station menu up"
  - id: btn_b2
    pin: 6
    header_pin: 31
    function: "ground-station menu down"
  - id: btn_b3
    pin: 13
    header_pin: 33
    function: "ground-station menu select"
  - id: btn_b4
    pin: 19
    header_pin: 35
    function: "ground-station menu back"

profiles:
  ground_station:
    tier: "lite"
    video_capable: true
    usb_gadget: true
    hdmi: true
    # Pi 4B supports all three distributed receive roles because it has
    # 4x USB ports for a primary WFB dongle plus a second dongle for the
    # 802.11s or IBSS mesh carrier.
    role: direct
    supports_roles:
      - direct
      - relay
      - receiver
    mesh_capable: true
    max_features:
      - wfb_rx
      - mediamtx_relay
      - wifi_ap
      - usb_tether
      - oled_ui
      - hdmi_kiosk
      - mesh_relay
      - mesh_receiver
      - batman_adv

# SPI LCD support. Pi has first-class Waveshare 35A overlay shipped
# in Raspberry Pi OS Bookworm at /boot/firmware/overlays/
# waveshare35a.dtbo. install-display-overlay.sh edits /boot/firmware
# /config.txt to add dtparam=spi=on + dtoverlay=waveshare35a and to
# comment out dtoverlay=vc4-kms-v3d (which claims fb0 + conflicts
# with the SPI fb). ADS7846 + ILI9486 wire to canonical BCM pins
# (T_IRQ = BCM 17 = pin 11, DC = BCM 24 = pin 18, RESET = BCM 25 =
# pin 22).
displays:
  supported:
    - id: waveshare35a
      type: spi-lcd
      controller: ILI9486
      touch_chip: ADS7846
      bus: spi0
      resolution: 480x320
      default_rotation: 90
      overlay_source: raspberrypi
      overlay_ref: waveshare35a
      gpio:
        dc:
          pin: GPIO24
          header_pin: 18
          direction: out
        reset:
          pin: GPIO25
          header_pin: 22
          direction: out
        touch_irq:
          pin: GPIO17
          header_pin: 11
          direction: in
      modules_required:
        - fbtft
        - fb_ili9486
        - ads7846

    # HDMI display carrying a standalone XPT2046 (ADS7846-compatible) SPI
    # resistive touch layer: video over HDMI, touch over the 40-pin SPI0
    # header. The Raspberry-Pi counterpart to the RK3588 hdmi_touch_xpt2046
    # binding on rock-5c-lite. The key difference from that board is that the
    # Pi firmware SHIPS the ads7846 device-tree overlay, so there is NO custom
    # DTS to compile: the installer only enables SPI and appends a
    # dtoverlay=ads7846 line to config.txt. A LIBINPUT_CALIBRATION_MATRIX udev
    # rule then maps the resistive contact onto the HDMI output for
    # cage/libinput. This is an ALTERNATIVE wiring to waveshare35a above (a rig
    # runs one or the other, never both), so overlay_source is "raspberrypi"
    # (firmware-provided overlay) and overlay_ref is the firmware overlay name.
    #
    # TO-VERIFY on rig: the exact PENIRQ GPIO, the SPI chip-select, and the raw
    # ADC edge bounds below are the standard Waveshare-style 5" HDMI + XPT2046
    # defaults (CE1 chip-select, PENIRQ on BCM GPIO25 / header pin 22, a
    # 200..3900 ADC span). The on-screen calibration wizard refits the bounds
    # on the rig and regenerates the udev matrix.
    - id: hdmi_touch_xpt2046
      type: hdmi-touch
      controller: HDMI
      touch_chip: ADS7846
      bus: spi0
      resolution: 800x480
      overlay_source: raspberrypi
      overlay_ref: ads7846
      modules_required:
        - ads7846
      touch:
        controller: XPT2046
        bus: spi0
        # SPI0 CE1 chip-select (header pin 26); CE0 (header pin 24) is often
        # already claimed on a 5" HDMI + XPT2046 shield. TO-VERIFY on rig.
        cs: 1
        irq:
          # PENIRQ pendown line, active-low. Feeds the ads7846 overlay's
          # penirq=<gpio> parameter as the bare BCM number (GPIO25 -> 25),
          # physical header pin 22. TO-VERIFY on rig.
          pin: GPIO25
          pinctrl: default
          header_pin: 22
          direction: in
        # Raw 12-bit ADC bounds at the panel edges. Standard Waveshare 5"
        # HDMI + XPT2046 defaults; the calibration wizard refits them on the
        # rig and regenerates the udev matrix. TO-VERIFY on rig.
        x_min: 200
        x_max: 3900
        y_min: 200
        y_max: 3900
        # Orientation of the resistive layer vs the landscape HDMI output.
        swap_xy: false
        invert_x: false
        invert_y: false
        modules_required:
          - ads7846
