name: "Raspberry Pi 4B"
vendor: "Raspberry Pi"
soc: "BCM2711"
arch: "aarch64"
model_patterns:
  - "Raspberry Pi 4 Model B"
  - "Raspberry Pi 4B"
default_tier: 3
gpio_pins:
  - 2   # SDA1
  - 3   # SCL1
  - 14  # UART TX
  - 15  # UART RX
  - 18  # PWM0
uart_paths:
  - /dev/ttyAMA0
  - /dev/ttyS0
hw_video_codecs:
  - h264_enc
  - h264_dec
  - h265_dec

# DEC-112: ground-station bench build uses OLED on I2C1 and four menu buttons.
buses:
  i2c:
    - id: i2c1
      path: /dev/i2c-1
      notes: "OLED on pins 3/5 (SDA/SCL)"

# Ground-station menu buttons (BCM GPIO numbering).
# header_pin is the physical pin on the 40-pin header.
gpio_buttons:
  - id: btn_b1
    pin: 5
    header_pin: 29
    function: "ground-station menu up"
  - id: btn_b2
    pin: 6
    header_pin: 31
    function: "ground-station menu down"
  - id: btn_b3
    pin: 13
    header_pin: 33
    function: "ground-station menu select"
  - id: btn_b4
    pin: 19
    header_pin: 35
    function: "ground-station menu back"

# ROS 2: 4-8 GB RAM variants. Docker fits but no NPU, so VIO is CPU-bound.
# MAVLink bridge + foxglove_bridge only. No VIO.
ros:
  supported: true
  max_profile: minimal

profiles:
  ground_station:
    tier: "lite"
    video_capable: true
    usb_gadget: true
    hdmi: true
    # DEC-119 / MSN-035: Phase 5 distributed RX. Pi 4B supports all
    # three roles because it has 4x USB ports for a primary WFB dongle
    # plus a second dongle for 802.11s/IBSS mesh carrier.
    role: direct
    supports_roles:
      - direct
      - relay
      - receiver
    mesh_capable: true
    max_features:
      - wfb_rx
      - mediamtx_relay
      - wifi_ap
      - usb_tether
      - oled_ui
      - hdmi_kiosk
      - mesh_relay
      - mesh_receiver
      - batman_adv
