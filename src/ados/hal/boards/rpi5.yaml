name: "Raspberry Pi 5"
vendor: "Raspberry Pi"
soc: "BCM2712"
arch: "aarch64"
model_patterns:
  - "Raspberry Pi 5 Model B"
  - "Raspberry Pi 5"
default_tier: 4
gpio_pins:
  - 2   # SDA1
  - 3   # SCL1
  - 14  # UART TX
  - 15  # UART RX
  - 18  # PWM0
uart_paths:
  - /dev/ttyAMA0
  - /dev/ttyS0
hw_video_codecs:
  - h264_dec
  - h265_enc
  - h265_dec

# No NPU on the Pi 5, but the Cortex-A76 quad at 2.4 GHz runs a small detector
# on the CPU via the in-process ONNX backend. This makes the installer fetch the
# onnx-enabled vision build and the perception tier read "local" (detection runs
# on-board, no compute-node offload needed).
compute:
  local_inference: onnx

# Pi 5 exposes 2x MIPI CSI on the board itself. Downward navigation
# camera lands on the spare CSI port; USB stays free for the WFB-ng
# dongle and accessory sensors.
video:
  csi_ports: 2
  max_encode_resolution: "1920x1080"
  max_encode_fps: 60
  encoder_api: v4l2
  nav_cameras:
    csi_count: 2
    usb_uvc_count: 4
    recommended_role: nav-csi

# VIO runs on the Cortex-A76 quad at the 8 GB SKU. Rangefinder lands on
# the primary UART or the I2C bus.
navigation:
  vio_capable: true
  rangefinder_ports:
    - {type: uart, path: /dev/ttyAMA0, baud_max: 115200}
    - {type: i2c, path: /dev/i2c-1, speed_hz: 400000}
