# Luckfox Pico RV1103 — Ultra-low-cost, telemetry-only
name: "Luckfox Pico RV1103"
vendor: "Luckfox"
soc: "RV1103"
arch: "armv7l"
model_patterns:
  - "rv1103"
  - "Luckfox Pico"
default_tier: 1

gpio_pins: []
uart_paths:
  - /dev/ttyS0
hw_video_codecs:
  - h264_enc
  - h264_dec

board:
  id: rv1103
  manufacturer: Luckfox
  status: testing

compute:
  cores: 1
  core_type: "Cortex-A7"
  max_freq_mhz: 1200
  gpu: null
  npu_tops: 0.5
  hw_encoder: ["h264"]
  hw_decoder: ["h264"]
  ram_mb: 64
  ram_type: built-in

storage:
  emmc: false
  sd_card: true
  nand: false

buses:
  uart:
    - id: uart0
      path: /dev/ttyS0
      baud: 921600
      fc_capable: true
  usb:
    - id: usb0
      path: "/dev/bus/usb/001/*"
      type: usb2
  i2c: []
  spi: []

network:
  wifi: false
  ethernet: true
  bluetooth: false

video:
  csi_ports: 1
  max_encode_resolution: "1920x1080"
  max_encode_fps: 30
  encoder_api: rkmedia
  # 64 MB RAM cannot host a nav pipeline alongside MAVLink relay. The
  # single CSI is reserved for the primary camera if used at all.
  nav_cameras:
    csi_count: 1
    usb_uvc_count: 0
    recommended_role: none

power:
  typical_watts: 0.8
  max_watts: 1.2
  voltage: 5.0

# ROS 2: 64 MB RAM, armv7l. Cannot run Docker or Jazzy.
ros:
  supported: false

# Telemetry-only profile. No navigation pipeline of any kind fits in
# 64 MB RAM. Rangefinder port left empty because the FC, not the
# companion, is the only place a rangefinder can land on this tier.
navigation:
  vio_capable: false
  rangefinder_ports: []

profiles:
  tier: minimal
  max_features:
    - mavlink_proxy
    - mqtt_gateway
  video_capable: true
  recommended_resolution: "640x480"
  memory_budget_mb: 52
  notes: "64MB RAM is very tight. MAVLink + MQTT only. No video pipeline, no webapp, no WiFi AP. Telemetry relay only."
