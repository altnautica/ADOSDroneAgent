<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Display . ADOS</title>
<link rel="stylesheet" href="styles.css">
</head>
<body data-page="display">
<header>
  <button class="back" type="button">Back</button>
  <div class="title">ADOS Ground Station . Setup</div>
</header>
<main>
  <h1>Display</h1>

  <div id="auth-banner" class="result-fail hidden"></div>

  <div class="card">
    <h2>OLED</h2>
    <div class="row">
      <label for="oled-brightness">Brightness (<span id="oled-brightness-label">-</span>)</label>
      <input id="oled-brightness" type="range" min="0" max="100" step="1" value="80" disabled>
    </div>
  </div>

  <div class="card">
    <h2>HDMI</h2>
    <div class="row">
      <label for="hdmi-res">Output resolution</label>
      <select id="hdmi-res" disabled>
        <option value="auto">Auto</option>
      </select>
    </div>
    <p class="muted">Not available yet.</p>
  </div>

  <div class="card">
    <h2>Gamepad</h2>
    <p class="muted">Not available yet.</p>
  </div>

  <div class="card">
    <h2>Bluetooth</h2>
    <button id="bt-pair" class="secondary" type="button" disabled>Pair device</button>
    <p class="muted">Not available yet.</p>
  </div>
</main>
<div id="spinner" class="spinner hidden"></div>
<script src="app.js"></script>
</body>
</html>
