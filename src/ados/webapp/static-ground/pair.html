<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pair with drone . ADOS</title>
<link rel="stylesheet" href="styles.css">
</head>
<body data-page="pair">
<header>
  <button class="back" type="button">Back</button>
  <div class="title">ADOS Ground Station . Setup</div>
</header>
<main>
  <h1>Pair with drone</h1>
  <p class="muted">Enter the pairing key shown on the drone OLED or in Mission Control.</p>

  <div id="auth-banner" class="result-fail hidden"></div>

  <div id="pair-already" class="card hidden">
    <p>Already paired with <span id="pair-already-drone" class="mono">-</span>.</p>
    <p class="muted">Unpair first to pair with a different drone.</p>
    <button id="pair-unpair" class="secondary" type="button">Unpair</button>
    <a href="index.html" class="secondary" style="display:inline-block;margin-left:8px;padding:10px 14px;text-decoration:none;">Back to home</a>
  </div>

  <form id="pair-form" class="card">
    <div class="row">
      <label for="pair-key">Pairing key</label>
      <input id="pair-key" class="mono" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="32 character pairing key">
    </div>
    <button class="primary" type="submit">Pair</button>
    <div id="pair-ok" class="result-ok hidden">Paired.</div>
    <div id="pair-fail" class="result-fail hidden"></div>
  </form>
</main>
<div id="spinner" class="spinner hidden"></div>
<script src="app.js"></script>
</body>
</html>
